<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kora Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAFA;--white:#FFFFFF;--line:#EFEFEF;--text:#1A1A1A;--muted:#737373;--light:#B0B0B0;--b1:#6B1F2A;--b2:#C4622D;--b3:#E8956D;--arc:#6BAED6;--grad:linear-gradient(135deg,#6B1F2A 0%,#C4622D 50%,#E8956D 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;padding-bottom:80px}
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--line)}
.logo{height:38px;border-radius:8px;padding:3px;box-shadow:0 0 0 1.5px var(--b2),0 0 0 3px rgba(232,149,109,.2);cursor:pointer}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{width:90px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad);border-radius:2px;transition:width .4s;width:0%}
.prog-pct{font-size:.75rem;color:var(--muted)}
.breadcrumb{display:flex;align-items:center;gap:8px;padding:9px 20px;font-size:.82rem;color:var(--muted);border-bottom:1px solid var(--line);flex-wrap:wrap}
.bc-link{cursor:pointer;transition:color .15s}.bc-link:hover{color:var(--b1)}
.bcsep{color:var(--line)}.bcactive{color:var(--b1);font-weight:500}
.nav-etapes{display:flex;align-items:center;padding:0 16px;overflow-x:auto;border-bottom:1px solid var(--line)}
.nav-etapes::-webkit-scrollbar{height:0}
.etape-btn{display:flex;align-items:center;gap:5px;padding:9px 11px;font-size:.78rem;font-family:'DM Sans',sans-serif;color:var(--light);background:transparent;border:none;cursor:pointer;white-space:nowrap;position:relative;transition:color .2s}
.etape-btn.done{color:var(--b2)}.etape-btn.active{color:var(--b1);font-weight:500}
.etape-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);border-radius:2px 2px 0 0}
.etape-dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:600;flex-shrink:0}
.etape-dot.done{background:var(--grad);color:#fff}.etape-dot.active{background:rgba(107,31,42,.1);color:var(--b1);border:1.5px solid var(--b1)}.etape-dot.lock{background:var(--line);color:var(--light)}
.page{display:none}.page.active{display:block}
.wrap{max-width:640px;margin:0 auto;padding:1.8rem 1.2rem}
.home-hero{text-align:center;padding:2.5rem 1.2rem 1.5rem;max-width:640px;margin:0 auto}
.home-hero h2{font-family:'Fraunces',serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:300;letter-spacing:-.03em;line-height:1.3;margin-bottom:.8rem}
.home-hero p{font-size:.9rem;color:var(--muted);line-height:1.7;max-width:440px;margin:0 auto 2rem}
.blocs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:0 1.2rem 2rem;max-width:900px;margin:0 auto}
.bloc-card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:1.4rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.bloc-card:hover{border-color:rgba(196,98,45,.3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,31,42,.07)}
.bloc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);opacity:0;transition:opacity .2s}
.bloc-card:hover::before{opacity:1}
.bloc-icon{font-size:1.8rem;margin-bottom:.8rem}.bloc-name{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:400;color:var(--text);margin-bottom:.4rem}
.bloc-desc{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:1rem}
.bloc-meta{display:flex;align-items:center;justify-content:space-between}
.bloc-count{font-size:.75rem;color:var(--light)}
.bloc-prog-bar{width:60px;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.bloc-prog-fill{height:100%;background:var(--grad);border-radius:2px}
.bloc-header{padding:1.4rem 1.2rem .8rem;max-width:640px;margin:0 auto}
.bloc-header h2{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:400;color:var(--text);margin-bottom:.3rem}
.bloc-header p{font-size:.85rem;color:var(--muted)}
.lecons-list{display:flex;flex-direction:column;gap:8px;padding:0 1.2rem;max-width:640px;margin:0 auto}
.lecon-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--white);border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:all .15s}
.lecon-item:hover{border-color:rgba(196,98,45,.25);background:#FFFAF8}
.lecon-item.done{border-color:rgba(76,175,80,.2);background:#F5FBF5}
.lecon-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;flex-shrink:0;background:var(--grad);color:#fff}
.lecon-num.done-num{background:linear-gradient(135deg,#4caf50,#81c784)}
.lecon-info{flex:1}.lecon-title{font-size:.9rem;font-weight:400;color:var(--text);margin-bottom:2px}
.lecon-sub{font-size:.75rem;color:var(--muted)}
.lecon-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-new{color:var(--b2);background:rgba(196,98,45,.1);border:1px solid rgba(196,98,45,.2)}
.badge-done{color:#2e7d32;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.2)}
.lesson-tag{display:inline-flex;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500;color:var(--arc);background:rgba(107,174,214,.1);border:1px solid rgba(107,174,214,.3);border-radius:20px;padding:3px 12px;margin-bottom:10px}
h1.lt{font-family:'Fraunces',serif;font-size:clamp(1.4rem,3.5vw,1.9rem);font-weight:400;letter-spacing:-.03em;line-height:1.2;margin-bottom:1.8rem}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic}
.screen{display:none}.screen.active{display:block}
.card{border:1px solid var(--line);border-radius:14px;padding:1.4rem;margin-bottom:1.2rem;background:var(--white)}
.card-warm{background:rgba(107,31,42,.03);border-color:rgba(107,31,42,.1)}
.card-blue{background:rgba(107,174,214,.04);border-color:rgba(107,174,214,.2)}
.slabel{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--b2);margin-bottom:.8rem}
.btext{font-size:.93rem;line-height:1.75;color:var(--text);margin-bottom:1rem}
.hint{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;background:rgba(107,31,42,.04);border-radius:8px;border:1px solid rgba(107,31,42,.08);margin-top:.6rem}
.hint-text{font-size:.85rem;color:var(--b1);line-height:1.6}
.exbl{margin-bottom:1rem}
.exbl-lbl{font-size:.7rem;color:var(--b2);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;margin-bottom:.3rem;text-transform:uppercase}
.regles{display:flex;flex-direction:column;gap:6px;margin-bottom:1.2rem}
.regle{display:flex;gap:12px;align-items:flex-start;padding:9px 12px;border-radius:8px}
.regle:nth-child(odd){background:#FAFAFA}
.rprop{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--b1);min-width:120px;flex-shrink:0}
.reff{font-size:.83rem;color:var(--muted);line-height:1.55}
pre{background:#FDF6F0;border:1px solid rgba(107,31,42,.1);border-left:3px solid var(--b2);border-radius:10px;padding:1rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.85;color:var(--text);overflow-x:auto;white-space:pre;margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:22px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.btn-p{background:var(--grad);color:#fff}.btn-o{background:transparent;color:var(--b1);border:1px solid rgba(107,31,42,.25)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn:disabled{opacity:.35;cursor:default}
.brow{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
.tag{display:inline-flex;border-radius:20px;padding:3px 12px;font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tag-a{color:var(--arc);background:rgba(107,174,214,.1);border:1px solid rgba(107,174,214,.3)}
.tag-b{color:var(--b2);background:rgba(196,98,45,.1);border:1px solid rgba(196,98,45,.25)}
.tag-memo{color:#7B5EA7;background:rgba(123,94,167,.1);border:1px solid rgba(123,94,167,.25)}
.tag-debug{color:#E67E22;background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.25)}
.trow{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:var(--white);cursor:pointer;font-size:.88rem;font-family:'DM Sans',sans-serif;color:var(--muted);text-align:left;transition:all .15s;width:100%}
.opt:hover{border-color:var(--b2);color:var(--b1);background:#FDF6F0}
.opt.sel{border-color:var(--b2);color:var(--b1);background:#FDF6F0}
.opt.ok{border-color:#4caf50;color:#2e7d32;background:#F0F8F0;cursor:default}
.opt.ko{border-color:#e57373;color:#c62828;background:#FDF0F0;cursor:default}
.oltr{font-family:'Fraunces',serif;opacity:.45;flex-shrink:0;width:20px;margin-top:1px}
.irow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.igrp label{font-size:.75rem;color:var(--muted);display:block;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.igrp input{border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:.85rem;font-family:'JetBrains Mono',monospace;background:var(--white);color:var(--text);outline:none;width:190px;transition:border-color .2s}
.igrp input:focus{border-color:var(--b2)}.igrp input.ok{border-color:#4caf50;background:#F0F8F0}.igrp input.ko{border-color:#e57373;background:#FDF0F0}
.memo-input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--text);outline:none;resize:vertical;min-height:70px;margin:.8rem 0 .5rem;transition:border-color .2s}
.memo-input:focus{border-color:rgba(123,94,167,.5)}
.btn-memo{border-radius:20px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.btn-memo-ok{background:rgba(76,175,80,.1);color:#2e7d32;border:1px solid rgba(76,175,80,.3)}
.btn-memo-ko{background:rgba(229,115,115,.1);color:#c62828;border:1px solid rgba(229,115,115,.3)}
.fb{border-radius:10px;padding:1rem;margin-top:10px}
.fb.ok{background:#F0F8F0;border:1px solid #4caf50}.fb.ko{background:#FDF0F0;border:1px solid #e57373}
.fb-t{font-weight:600;font-size:.9rem;margin-bottom:5px}
.fb.ok .fb-t{color:#2e7d32}.fb.ko .fb-t{color:#c62828}
.fb-x{color:var(--muted);font-size:.85rem;line-height:1.65}
.resume-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:1.2rem}
.resume-item{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:1rem}
.resume-icon{font-size:1.1rem;margin-bottom:.4rem}
.resume-key{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--b1);margin-bottom:.3rem;font-weight:500}
.resume-val{font-size:.82rem;color:var(--muted);line-height:1.55}
.rfooter{border-top:1px solid rgba(107,31,42,.1);padding-top:1rem;margin-top:.5rem}
.rfooter p{font-size:.82rem;color:var(--muted);line-height:1.6}
.eval-card{background:linear-gradient(135deg,rgba(107,31,42,.04),rgba(232,149,109,.06));border:1px solid rgba(196,98,45,.2);border-radius:16px;padding:1.6rem;text-align:center;margin:1.5rem 1.2rem}
.eval-card h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:400;color:var(--text);margin-bottom:.5rem}
.eval-card p{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:1rem}
.eval-lock{font-size:.82rem;color:var(--light);margin-top:.5rem}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:200;padding:6px 0}
.mob-inner{display:flex;justify-content:space-around}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;color:var(--light);cursor:pointer;padding:4px 16px;transition:color .15s}
.mob-item.active{color:var(--b1)}.mob-ic{font-size:1.4rem;line-height:1.2}
@media(max-width:680px){.mob-nav{display:block}}
@media(max-width:480px){.regle{flex-direction:column;gap:3px}.rprop{min-width:auto}.wrap{padding:1.4rem .9rem}.blocs-grid{grid-template-columns:1fr;padding:0 .9rem 1.5rem}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:12px">
      <img src="logo.jpg" alt="Kora" class="logo" onclick="showHome()">
      <span style="font-family:'Fraunces',serif;font-size:1rem;color:var(--text)" id="headerTitle">Kora Academy</span>
    </div>
    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <span class="prog-pct" id="progPct">0%</span>
    </div>
  </div>
  <div class="breadcrumb" id="breadcrumb"><span class="bcactive">Formations</span></div>
  <div class="nav-etapes" id="navEtapes" style="display:none"></div>
</div>
<div class="page active" id="page-home">
  <div class="home-hero">
    <h2>Apprendre n'a jamais autant <em class="grad">rapport&eacute;.</em></h2>
    <p>Des formations compl&egrave;tes avec exercices interactifs. Chaque notion expliqu&eacute;e, chaque erreur corrig&eacute;e imm&eacute;diatement.</p>
  </div>
  <div class="blocs-grid" id="blocsGrid"></div>
</div>
<div class="page" id="page-bloc">
  <div class="bloc-header"><h2 id="blocTitle"></h2><p id="blocDesc"></p></div>
  <div class="lecons-list" id="leconsList"></div>
  <div id="evalZone"></div>
</div>
<div class="page" id="page-lecon">
  <div class="wrap">
    <div class="lesson-tag" id="leconTag"></div>
    <h1 class="lt" id="leconH1"></h1>
    <div id="leconScreens"></div>
  </div>
</div>
<div class="mob-nav">
  <div class="mob-inner">
    <div class="mob-item" onclick="window.location.href='index.html'"><span class="mob-ic">&#8962;</span>Accueil</div>
    <div class="mob-item active" onclick="showHome()"><span class="mob-ic">&#10010;</span>Formation</div>
    <div class="mob-item" onclick="window.location.href='index.html'"><span class="mob-ic">&#9711;</span>Profil</div>
  </div>
</div>
<script>
const BLOCS = [{"id":"js","icon":"&#9889;","name":"JavaScript","desc":"Variables, types, conditions, boucles, fonctions, tableaux, objets, DOM, &#233;v&#233;nements, classes, async, fetch, modules.","lecons":[{"id":"js-1","num":1,"tag":"JavaScript &middot; Le&ccedil;on 1","title":"Les variables","sub":"Stocker et r&eacute;utiliser des donn&eacute;es","pourquoi":"Une variable est une bo&icirc;te avec un nom. Tu y mets une valeur &mdash; texte, nombre &mdash; et tu peux l&rsquo;utiliser partout. Sans variables, tout serait &eacute;crit en dur.","exemple":"DB Studio : nom du client, prix, pages. Kora : tokens, score. Ce sont toutes des variables.","exemples":[{"label":"const &mdash; fixe","code":"const nomClient = 'Hotel Le Napoleon';\nconst prixBase = 1200;\nconsole.log(nomClient);"},{"label":"let &mdash; change","code":"let pages = 5;\nlet total = pages * prixBase;\npages = pages + 2; // modifier\ntotal = pages * prixBase; // recalcul"},{"label":"var &mdash; eviter","code":"// var imprev\nvar x = 10;\nif(true) { var x = 20; } // bug global!\nconsole.log(x); // 20 bug\n\n// let correct\nlet y = 10;\nif(true) { let y = 20; } // local\nconsole.log(y); // 10"}],"regles":[{"prop":"const","expl":"Valeur fixe. Ne change pas. Par d&eacute;faut."},{"prop":"let","expl":"Valeur modifiable. Pour compteurs et &eacute;tats."},{"prop":"var","expl":"Obsol&egrave;te. Probl&egrave;mes de port&eacute;e. Ne jamais utiliser."}],"code":"const nomSite = 'Kora';\nconst annee = 2026;\n\nlet score = 0;\nscore = score + 10; // OK\nscore += 5; // raccourci\n\n// const interdit la reassignation\n// const nomSite = 'autre'; // ERREUR\n\nconst [prenom, nom] = ['Val', 'D'];\nconsole.log(prenom); // Val","exercices":[{"type":"qcm","question":"Tu stockes l'URL de l'API Kora qui ne changera jamais. Tu utilises quoi ?","options":["var apiUrl = 'url'","let apiUrl = 'url'","const apiUrl = 'url'","apiUrl = 'url'"],"bonne":2,"explication":"const est parfait pour les valeurs fixes. Il empeche les modifications accidentelles."},{"type":"completion","question":"Cree un compteur de tokens qui commence a 0 et peut augmenter :","labels":["mot-cle","valeur initiale"],"bonnes":["let","0"],"template":"[A] tokens = [B];\ntokens = tokens + 15;\nconsole.log(tokens); // 15"},{"type":"memo","question":"Declare une constante vitesse avec la valeur 300.","bonne":"const vitesse = 300;","indice":"mot-cle nom = valeur ;","explication":"const vitesse = 300; &mdash; mot-cl&eacute;, nom, =, valeur, point-virgule."},{"type":"debug","question":"Ce code plante. Trouve l'erreur :","codeFaux":"const compteur = 0;\ncompteur = compteur + 1; // erreur\nconsole.log(compteur);","codeCorrige":"let compteur = 0;\ncompteur = compteur + 1;\nconsole.log(compteur);","options":["console.log incorrect","const doit etre let (valeur modifiable)","compteur + 1 invalide","Point-virgule manquant"],"bonne":1,"explication":"const interdit toute reassignation. Utiliser let pour les valeurs qui changent."}],"resume":[{"icon":"&#128230;","key":"const","val":"Valeur fixe. Par d&eacute;faut."},{"icon":"&#128260;","key":"let","val":"Valeur modifiable."},{"icon":"&#9888;&#65039;","key":"var","val":"Obsol&egrave;te &mdash; jamais."},{"icon":"&#128161;","key":"R&egrave;gle","val":"const d&rsquo;abord. let si modification."}]},{"id":"js-2","num":2,"tag":"JavaScript &middot; Le&ccedil;on 2","title":"Les types de donn&eacute;es","sub":"Ce que JavaScript peut stocker","pourquoi":"Chaque variable a un type. JS est dynamiquement typ&eacute; mais comprendre les types &eacute;vite des bugs : '5' + 3 = '53' au lieu de 8.","exemple":"Un formulaire renvoie toujours du texte. Sans convertir, '5' + 3 = '53'. Bug classique sur les formulaires de commande.","exemples":[{"label":"Types primitifs","code":"const texte = 'Kora';      // string\nconst nombre = 2026;        // number\nconst vrai = true;          // boolean\nconst rien = null;          // null\nconst indefini = undefined; // undefined"},{"label":"typeof","code":"console.log(typeof 'Kora'); // string\nconsole.log(typeof 42);    // number\nconsole.log(typeof true);  // boolean\nconsole.log(typeof null);  // object <- bug JS historique"},{"label":"Conversion","code":"const input = '42'; // vient d'un formulaire\nconst prix = Number(input); // 42\n\n// Piege !\nconsole.log('5' + 3);         // '53'\nconsole.log(Number('5') + 3); // 8"}],"regles":[{"prop":"string","expl":"Texte. Guillemets simples, doubles ou backticks."},{"prop":"number","expl":"Entier ou d&eacute;cimal. Un seul type en JS."},{"prop":"boolean","expl":"true ou false."},{"prop":"null","expl":"Absence de valeur intentionnelle."},{"prop":"typeof","expl":"Retourne le type en string."}],"code":"const prenom = 'Val';\nconst bio = `Fondatrice de ${prenom}`;\nconst age = 22;\nconst estConnecte = true;\n\nconsole.log(typeof prenom); // string\nconsole.log(typeof age);    // number\n\n// Piege !\nconsole.log('5' + 3);         // '53'\nconsole.log(Number('5') + 3); // 8","exercices":[{"type":"qcm","question":"Un formulaire HTML renvoie toujours le type... ?","options":["number","boolean","string","undefined"],"bonne":2,"explication":"Tous les inputs retournent des strings. Convertir avec Number() avant les calculs."},{"type":"completion","question":"Convertis l'input en nombre pour calculer le prix :","labels":["conversion","calcul"],"bonnes":["Number","prix * 2"],"template":"const input = document.querySelector('#qte').value;\nconst qte = [A](input);\nconst total = [B];\nconsole.log(total);"},{"type":"memo","question":"Afficher le type de la variable 'score' dans la console.","bonne":"console.log(typeof score);","indice":"console.log( typeof nom_variable )","explication":"typeof est un operateur. typeof score sans parentheses autour de score."},{"type":"debug","question":"Le total est '310' au lieu de 30. Trouve pourquoi :","codeFaux":"const qte = '3';  // input\nconst prix = 10;\nconst total = qte + prix;\nconsole.log(total); // '310'","codeCorrige":"const qte = Number('3');\nconst pr ndant l&rsquo;attente.","exemples":[{"label":"Creer et utiliser","code":"const p = new Promise((resolve, reject) => {\n  setTimeout(() => resolve('OK!'), 1000);\n});\n\np.then(data => console.log(data))\n .catch(err => console.error(err))\n .finally(() => console.log('Fin'));"},{"label":"Promise.all","code":"Promise.all([\n  fetch('/api/posts'),\n  fetch('/api/user'),\n]).then(([posts, user]) => {\n  console.log(posts, user);\n});"}],"regles":[{"prop":"new Promise()","expl":"resolve = succ&egrave;s, reject = &eacute;chec."},{"prop":".then(fn)","expl":"Si r&eacute;solue."},{"prop":".catch(fn)","expl":"Si rejet&eacute;e."},{"prop":".finally(fn)","expl":"Toujours."},{"prop":"Promise.all()","expl":"Attend toutes."}],"code":"function chargerUser(id) {\n  return new Promise((resolve, reject) => {\n    setTimeout(() => {\n      if (id > 0) resolve({ id, nom: 'Val' });\n      else reject(new Error('ID invalide'));\n    }, 500);\n  });\n}\n\nchargerUser(1)\n  .then(user => user.nom)\n  .then(nom => console.log(nom))\n  .catch(err => console.error(err.message));","exercices":[{"type":"qcm","question":"3 etats d'une Promise ?","options":["start, loading, done","pending, fulfilled, rejected","new, active, closed","waiting, success, failed"],"bonne":1,"explication":"pending (attente), fulfilled (resolue - .then()), rejected (rejetee - .catch())."},{"type":"completion","question":"Gerer succes et erreur :","labels":[".then",".catch"],"bonnes":["data => console.log(data)","err => console.error(err)"],"template":"fetch('/api/posts')\n  .then(res => res.json())\n  .then([A])\n  .catch([B]);"},{"type":"memo","question":"Promise qui se resout avec 'OK' apres 1 seconde.","bonne":"const p = new Promise((resolve) => {\n  setTimeout(() => resolve('OK'), 1000);\n});","indice":"new Promise((resolve) => { setTimeout(() => resolve(val), ms) })","explication":"resolve(valeur) resout. setTimeout simule l'asynchrone."},{"type":"debug","question":"Erreurs ignorees :","codeFaux":"fetch('/api/data')\n  .then(res => res.json())\n  .then(data => traiter(data))\n// pas de .catch","codeCorrige":"fetch('/api/data')\n  .then(res => res.json())\n  .then(data => traiter(data))\n  .catch(err => console.error(err));","options":["fetch sans Promise","Manque .catch() - erreurs silencieuses","then -> done","res.json() incorrect"],"bonne":1,"explication":"Sans .catch(), erreurs silencieuses. Toujours terminer par .catch()."}],"resume":[{"icon":"&#9203;","key":"pending","val":"En attente"},{"icon":"&#9989;","key":"fulfilled","val":"R&eacute;solue &rarr; .then()"},{"icon":"&#10060;","key":"rejected","val":"Rejet&eacute;e &rarr; .catch()"},{"icon":"&#128279;","key":"chainer","val":".then().catch()"}]},{"id":"js-13","num":13,"tag":"JavaScript &middot; Le&ccedil;on 13","title":"Async / Await","sub":"Syntaxe moderne asynchrone","pourquoi":"async/await est du sucre sur les Promises. Code asynchrone qui ressemble &agrave; du synchrone &mdash; bien plus lisible.","exemple":"async function charger() { const res = await fetch(url); return await res.json(); }","exemples":[{"label":"async/await vs .then()","code":"// Promises - chaine\nfetch('/api/user').then(r => r.json()).then(d => console.log(d));\n\n// async/await - lineaire\nasync function charger() {\n  const res = await fetch('/api/user');\n  const data = await res.json();\n  console.log(data);\n}"},{"label":"try/catch","code":"async function chargerPost(id) {\n  try {\n    const res = await fetch(`/api/posts/${id}`);\n    if (!res.ok) throw new Error(`HTTP ${res.status}`);\n    return await res.json();\n  } catch (err) {\n    console.error(err.message);\n    return null;\n  }\n}"}],"regles":[{"prop":"async function","expl":"Retourne une Promise. Active await."},{"prop":"await","expl":"Attend la Promise sans bloquer."},{"prop":"try/catch","expl":"Capture les erreurs."},{"prop":"await Promise.all()","expl":"Plusieurs en parall&egrave;le."}],"code":"async function chargerFormations() {\n  try {\n    const res = await fetch('https: Val(prev => ...)","expl":"Base sur la valeur pr&eacute;c&eacute;dente."},{"prop":"Jamais muter","expl":"Toujours nouvelle valeur."}],"code":"function PostKora({ initialLikes, texte, auteur }) {\n  const [likes, setLikes] = useState(initialLikes);\n  const [likee, setLikee] = useState(false);\n  \n  const toggle = () => {\n    setLikes(prev => likee ? prev - 1 : prev + 1);\n    setLikee(prev => !prev);\n  };\n  \n  return (\n    <article>\n      <p><strong>{auteur}</strong></p>\n      <p>{texte}</p>\n      <button onClick={toggle}\n        className={likee ? 'liked' : ''}>\n        Likes: {likes}\n      </button>\n    </article>\n  );\n}","exercices":[{"type":"qcm","question":"Pourquoi setVal() plutot que modifier directement ?","options":["Plus rapide","React detecte les changements seulement via set - muter directement ne re-rend pas","Eviter erreurs syntaxe","Copie auto"],"bonne":1,"explication":"Muter directement = meme reference. React ne voit pas la difference. setVal() = nouvelle reference."},{"type":"completion","question":"Composant toggle :","labels":["initial","update"],"bonnes":["false","!ouvert"],"template":"function Toggle() {\n  const [ouvert, setOuvert] = useState([A]);\n  return (\n    <button onClick={() => setOuvert([B])}>\n      {ouvert ? 'Fermer' : 'Ouvrir'}\n    </button>\n  );\n}"},{"type":"memo","question":"useState pour un tableau de posts vide.","bonne":"const [posts, setPosts] = useState([]);","indice":"const [valeur, setValeur] = useState( initiale )","explication":"useState([]) - init avec tableau vide. Convention : posts / setPosts."},{"type":"debug","question":"Pas de mise a jour au clic :","codeFaux":"function Compteur() {\n  const [count, setCount] = useState(0);\n  function inc() {\n    count = count + 1; // erreur\n  }\n  return <button onClick={inc}>{count}</button>;\n}","codeCorrige":"function Compteur() {\n  const [count, setCount] = useState(0);\n  function inc() {\n    setCount(count + 1);\n  }\n  return <button onClick={inc}>{ } {...p} />);\n}"},{"label":"Custom hook","code":"function useFetch(url) {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const [erreur, setErreur] = useState(null);\n  \n  useEffect(() => {\n    fetch(url)\n      .then(r => r.json())\n      .then(d => { setData(d); setLoading(false); })\n      .catch(e => { setErreur(e.message); setLoading(false); });\n  }, [url]);\n  \n  return { data, loading, erreur };\n}\n\nconst { data: formations, loading } = useFetch('/api/formations');"}],"regles":[{"prop":"useState + useEffect + fetch","expl":"Le trio fondamental."},{"prop":"loading + erreur","expl":"Toujours g&eacute;rer les &eacute;tats interm&eacute;diaires."},{"prop":"finally {}","expl":"D&eacute;sactive le loading."},{"prop":"Custom hook","expl":"useFetch() pour r&eacute;utiliser la logique."}],"code":"function Formations() {\n  const [formations, setFormations] = useState([]);\n  const [loading, setLoading] = useState(true);\n  const [erreur, setErreur] = useState(null);\n  \n  useEffect(() => {\n    async function charger() {\n      try {\n        const res = await fetch('https://api.kora.io/formations');\n        if (!res.ok) throw new Error(`HTTP ${res.status}`);\n        setFormations(await res.json());\n      } catch(e) {\n        setErreur(e.message);\n      } finally {\n        setLoading(false);\n      }\n    }\n    charger();\n  }, []);\n  \n  if (loading) return <div>Chargement...</div>;\n  if (erreur) return <div>Erreur : {erreur}</div>;\n  \n  return (\n    <div className=\"grille\">\n      {formations.map(f => <Carte key={f.id} {...f} />)}\n    </div>\n  );\n}","exercices":[{"type":"qcm","question":"Pourquoi async DANS useEffect et pas useEffect async ?","options":["Convention","useEffect doit retourner undefined ou cleanup - pas une Promise","Performance","useEffect async inexistant"],"bonne":1,"explication":"useEffect retourne undefined ou cleanup. Async retourne une Promise. React ne sait pas quoi faire. }

function showBloc(blocId){
  currentBloc=BLOCS.find(b=>b.id===blocId);
  document.getElementById('navEtapes').style.display='none';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('headerTitle').textContent=currentBloc.name;
  document.getElementById('breadcrumb').innerHTML='<span class="bc-link" onclick="showHome()">Formations</span><span class="bcsep"> &rsaquo; </span><span class="bcactive">'+currentBloc.name+'</span>';
  document.getElementById('blocTitle').innerHTML=currentBloc.icon+' '+currentBloc.name;
  document.getElementById('blocDesc').innerHTML=currentBloc.desc;
  const done=currentBloc.lecons.filter(l=>leconDone[l.id]).length;
  const total=currentBloc.lecons.length;
  document.getElementById('leconsList').innerHTML=currentBloc.lecons.map((l,i)=>{
    const d=leconDone[l.id];
    return '<div class="lecon-item'+(d?' done':'')+'" onclick="showLecon(\x27'+l.id+'\x27)">'+
      '<div class="lecon-num'+(d?' done-num':'')+'">'+(d?'✓':i+1)+'</div>'+
      '<div class="lecon-info"><div class="lecon-title">'+l.title+'</div><div class="lecon-sub">'+l.sub+'</div></div>'+
      '<span class="lecon-badge '+(d?'badge-done':'badge-new')+'">'+(d?'Terminée':'Nouveau')+'</span></div>';
  }).join('');
  const allDone=done===total&&total>0;
  document.getElementById('evalZone').innerHTML='<div class="eval-card"><h3>&#127919; Évaluation '+currentBloc.name+'</h3>'+
    '<p>Compl&egrave;te toutes les le&ccedil;ons pour d&eacute;bloquer l&#39;&eacute;valuation et gagner tes tokens KRT.</p>'+
    (allDone?'<button class="btn btn-p" onclick="alert(\x27Evaluation a venir !\x27)">Commencer l&#39;&eacute;valuation &rarr;</button>':
    '<button class="btn btn-g" disabled>Commencer l&#39;&eacute;valuation &rarr;</button><p class="eval-lock">'+done+'/'+total+' leçons terminées</p>')+'</div>';
  showPage('bloc');
}

function showLecon(leconId){
  let found=null;
  for(const b of BLOCS){found=b.lecons.find(l=>l.id===leconId);if(found){currentBloc=b;break;}}
  if(!found)return;
  currentLecon=found;
  if(!stepDone[leconId])stepDone[leconId]=new Set();
  if(!stepCurrent[leconId])stepCurrent[leconId]='intro';
  document.getElementById('leconTag').innerHTML=currentLecon.tag||'';
  document.getElementById('leconH1').innerHTML=currentLecon.title+' &mdash; <span class="grad">'+currentLecon.sub+'</span>';
  document.getElementById('headerTitle').textContent=currentLecon.title;
  document.getElementById('breadcrumb').innerHTML='<span class="bc-link" onclick="showHome()">Formations</span><span class="bcsep"> &rsaquo; </span>'+
    '<span class="bc-link" onclick="showBloc(\x27'+currentBloc.id+'\x27)">'+currentBloc.name+'</span><span class="bcsep"> &rsaquo; </span>'+
    '<span class="bcactive">'+currentLecon.title+'</span>';
  document.getElementById('progWrap').style.display='flex';
  renderLecon();showPage('lecon');
}

function getORD(lecon){return['intro','cours',...lecon.exercices.map((_,i)=>'ex'+(i+1)),'resume'];}

function renderLecon(){
  if(!currentLecon)return;
  const lid=currentLecon.id,ORD=getORD(currentLecon),cur=stepCurrent[lid];
  const labels=['Intro','Cours',...currentLecon.exercices.map((_,i)=>'Ex.'+(i+1)),'Résumé'];
  document.getElementById('navEtapes').style.display='flex';
  document.getElementById('navEtapes').innerHTML=ORD.map((sid,i)=>{
    const d=stepDone[lid].has(sid),a=sid===cur;
    return '<button class="etape-btn '+(d?'done':a?'active':'')+'" onclick="goStep(\x27'+sid+'\x27)">'+
      '<span class="etape-dot '+(d?'done':a?'active':'lock')+'">'+(d?'✓':i+1)+'</span>'+labels[i]+'</button>';
  }).join('');
  const pct=Math.round((ORD.indexOf(cur)/(ORD.length-1))*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('leconScreens').innerHTML=renderScreen(cur,currentLecon,ORD);
}

function renderScreen(cur,lecon,ORD){
  const lid=lecon.id,next=ORD[ORD.indexOf(cur)+1];
  if(cur==='intro'){
    const exs=(lecon.exemples||[]).map(ex=>'<div class="exbl"><div class="exbl-lbl">'+ex.label+'</div><pre>'+esc(ex.code)+'</pre></div>').join('');
    return '<div class="screen active"><div class="card card-warm"><p class="slabel">Pourquoi tu as besoin de ça</p><p class="btext">'+lecon.pourquoi+'</p>'+
      (lecon.exemple?'<div class="hint"><span style="color:var(--b3);flex-shrink:0;margin-top:2px">&#9672;</span><span class="hint-text">'+lecon.exemple+'</span></div>':'')+'</div>'+
      (exs?'<div class="card"><p class="slabel">Exemples dans ce cours</p>'+exs+'</div>':'')+
      '<button class="btn btn-p" onclick="goStep(\x27cours\x27)">Commencer &rarr;</button></div>';
  }
  if(cur==='cours'){
    const reg=lecon.regles.map((r,i)=>'<div class="regle"><span class="rprop">'+r.prop+'</span><span class="reff">'+r.expl+'</span></div>').join('');
    return '<div class="screen active"><div class="card"><p class="slabel">Les règles à retenir</p><div class="regles">'+reg+'</div></div>'+
      '<div class="card"><p class="slabel">Exemple — lis chaque ligne</p><pre>'+esc(lecon.code)+'</pre></div>'+
      '<button class="btn btn-p" onclick="goStep(\x27ex1\x27)">Je comprends — exercice &rarr;</button></div>';
  }
  if(cur==='resume'){
    const items=lecon.resume.map(r=>'<div class="resume-item"><div class="resume-icon">'+r.icon+'</div><div class="resume-key">'+r.key+'</div><div class="resume-val">'+r.val+'</div></div>').join('');
    return '<div class="screen active"><div class="card card-warm"><p class="slabel">&#10022; Ce que tu retiens</p><div class="resume-grid">'+items+'</div>'+
      '<div class="rfooter"><p>Les tokens KRT sont accordés à la fin de l&#39;&eacute;valuation du bloc selon ta note.</p></div></div>'+
      '<div class="brow"><button class="btn btn-g" onclick="goStep(\x27intro\x27)">&#8592; Revoir</button>'+
      '<button class="btn btn-p" onclick="finirLecon()">Leçon suivante &rarr;</button></div></div>';
  }
  const exIdx=parseInt(cur.replace('ex',''))-1;
  const ex=lecon.exercices[exIdx];
  const sk=lid+'-'+cur;
  const typeLbl={qcm:'QCM',completion:'Compléter',memo:'Mémo',debug:'Déboguer'}[ex.type];
  const tagC={qcm:'tag-b',completion:'tag-a',memo:'tag-memo',debug:'tag-debug'}[ex.type];
  let inner='';
  if(ex.type==='qcm'||ex.type==='debug'){
    const opts=ex.options.map((o,i)=>'<button class="opt" id="opt-'+sk+'-'+i+'" onclick="selOpt(\x27'+sk+'\x27,'+i+')"><span class="oltr">'+['A','B','C','D'][i]+'.</span>'+o+'</button>').join('');
    const codeF=ex.type==='debug'?'<p class="slabel" style="margin-top:.5rem">Code avec erreur</p><pre>'+esc(ex.codeFaux)+'</pre>':'';
    const vFn=ex.type==='debug'?
      'valDebug(\x27'+sk+'\x27,'+ex.bonne+',\x27'+next+'\x27,\x27'+escQ(ex.explication)+'\x27,\x27'+escQ(ex.codeCorrige)+'\x27)':
      'valQCM(\x27'+sk+'\x27,'+ex.bonne+',\x27'+next+'\x27,\x27'+escQ(ex.explication)+'\x27)';
    inner='<p class="btext">'+ex.question+'</p>'+codeF+'<div class="opts" id="opts-'+sk+'">'+opts+'</div><div id="fb-'+sk+'"></div><div class="brow"><button class="btn btn-p" id="val-'+sk+'" onclick="'+vFn+'" disabled>Valider &rarr;</button></div>';
  }
  if(ex.type==='completion'){
    const inputs=ex.labels.map((lbl,i)=>'<div class="igrp"><label>'+['A','B','C'][i]+' &mdash; '+lbl+'</label><input id="inp-'+sk+'-'+i+'" placeholder="ta réponse…" oninput="upComp(\x27'+sk+'\x27,'+ex.labels.length+','+JSON.stringify(ex.bonnes)+','+JSON.stringify(ex.template)+')"></div>').join('');
    const initPrev=ex.template.replace(/\[A\]/g,'[?]').replace(/\[B\]/g,'[?]').replace(/\[C\]/g,'[?]');
    inner='<p class="btext">'+ex.question+'</p><div class="irow">'+inputs+'</div><pre id="prev-'+sk+'">'+esc(initPrev)+'</pre><div id="fb-'+sk+'"></div><div class="brow"><button class="btn btn-p" id="val-'+sk+'" onclick="valComp(\x27'+sk+'\x27,'+ex.labels.length+','+JSON.stringify(ex.bonnes)+',\x27'+next+'\x27)" disabled>Valider &rarr;</button></div>';
  }
  if(ex.type==='memo'){
    inner='<p class="btext">'+ex.question+'</p><div class="card card-blue" style="text-align:center;padding:1.2rem;margin-bottom:1rem"><p style="font-size:.7rem;color:var(--arc);font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">INDICE</p><p style="font-family:Fraunces,serif;font-size:.95rem;color:var(--text)">'+ex.indice+'</p></div><textarea class="memo-input" id="memo-'+sk+'" placeholder="Écris ta réponse sans regarder le cours…" rows="3"></textarea><div id="fb-'+sk+'"></div><div class="brow"><button class="btn btn-p" onclick="valMemo(\x27'+sk+'\x27,\x27'+escQ(ex.bonne)+'\x27,\x27'+next+'\x27,\x27'+escQ(ex.explication)+'\x27)">Vérifier &rarr;</button><button class="btn btn-g" onclick="showMA(\x27'+sk+'\x27,\x27'+escQ(ex.bonne)+'\x27)">Voir la réponse</button></div>';
  }
  return '<div class="screen active"><div class="card"><div class="trow"><span class="tag tag-a">Exercice '+(exIdx+1)+' / '+lecon.exercices.length+'</span><span class="tag '+tagC+'">'+typeLbl+'</span></div>'+inner+'</div></div>';
}

function goStep(sid){
  if(!currentLecon)return;
  const lid=currentLecon.id;
  stepDone[lid].add(stepCurrent[lid]);
  stepCurrent[lid]=sid;
  renderLecon();window.scrollTo(0,0);
}

function finirLecon(){
  if(!currentLecon)return;
  leconDone[currentLecon.id]=true;
  showBloc(currentBloc.id);
}

function selOpt(sk,idx){
  stepSel[sk]=idx;
  document.querySelectorAll('#opts-'+sk+' .opt').forEach(o=>o.classList.remove('sel'));
  document.getElementById('opt-'+sk+'-'+idx)?.classList.add('sel');
  const v=document.getElementById('val-'+sk);
  if(v)v.disabled=false;
}

function valQCM(sk,bonne,next,expl){
  const sel=stepSel[sk];if(sel===undefined)return;
  const ok=sel===bonne;
  document.querySelectorAll('#opts-'+sk+' .opt').forEach((o,i)=>{
    o.onclick=null;o.style.cursor='default';
    if(i===bonne)o.className='opt ok';
    else if(i===sel&&!ok)o.className='opt ko';
  });
  showFb(sk,ok,expl,next);
  document.getElementById('val-'+sk).style.display='none';
}

function valDebug(sk,bonne,next,expl,codeCorrige){
  const sel=stepSel[sk];if(sel===undefined)return;
  const ok=sel===bonne;
  document.querySelectorAll('#opts-'+sk+' .opt').forEach((o,i)=>{
    o.onclick=null;o.style.cursor='default';
    if(i===bonne)o.className='opt ok';
    else if(i===sel&&!ok)o.className='opt ko';
  });
  const extra='<div style="margin-top:1rem"><p class="slabel">Code corrigé</p><pre>'+esc(codeCorrige)+'</pre></div>';
  showFb(sk,ok,expl,next,extra);
  document.getElementById('val-'+sk).style.display='none';
}

function upComp(sk,n,bonnes,template){
  let t=template;
  for(let i=0;i<n;i++){const v=document.getElementById('inp-'+sk+'-'+i)?.value||['[?]','[?]','[?]'][i];t=t.replace(['[A]','[B]','[C]'][i],v);}
  document.getElementById('prev-'+sk).textContent=t;
  const filled=Array.from({length:n},(_,i)=>document.getElementById('inp-'+sk+'-'+i)?.value).every(Boolean);
  const v=document.getElementById('val-'+sk);if(v)v.disabled=!filled;
}

function valComp(sk,n,bonnes,next){
  const vals=Array.from({length:n},(_,i)=>document.getElementById('inp-'+sk+'-'+i)?.value?.trim()?.toLowerCase());
  const ok=vals.every((v,i)=>v===bonnes[i].toLowerCase());
  Array.from({length:n},(_,i)=>{const e=document.getElementById('inp-'+sk+'-'+i);if(e){e.className=ok?'ok':'ko';e.disabled=true;}});
  showFb(sk,ok,ok?'':'Réponses attendues : '+bonnes.join(' · '),next);
  document.getElementById('val-'+sk).style.display='none';
}

function valMemo(sk,bonne,next,expl){
  const input=document.getElementById('memo-'+sk)?.value?.trim();if(!input)return;
  const fb=document.getElementById('fb-'+sk);
  fb.innerHTML='<div class="card card-blue" style="margin-top:.8rem"><p class="slabel" style="color:var(--arc)">Ta réponse</p><pre style="background:transparent;border:none;padding:0">'+esc(input)+'</pre></div>'+
    '<div class="card card-warm" style="margin-top:.8rem"><p class="slabel">Réponse attendue</p><pre style="background:transparent;border:none;padding:0">'+esc(bonne)+'</pre>'+
    '<p style="font-size:.82rem;color:var(--muted);margin-top:.6rem;line-height:1.6">'+expl+'</p></div>'+
    '<div class="brow" style="margin-top:1rem"><button class="btn-memo btn-memo-ok" onclick="goStep(\x27'+next+'\x27)">✓ J&#39;avais bon</button>'+
    '<button class="btn-memo btn-memo-ko" onclick="goStep(\x27'+next+'\x27)">✗ À retenir</button></div>';
  document.getElementById('memo-'+sk).style.display='none';
}

function showMA(sk,bonne){
  document.getElementById('fb-'+sk).innerHTML='<div class="card card-warm" style="margin-top:.8rem"><p class="slabel">Réponse</p><pre style="background:transparent;border:none;padding:0">'+esc(bonne)+'</pre></div>';
}

function showFb(sk,ok,expl,next,extra=''){
  const nb=ok?'<div class="brow"><button class="btn btn-o" onclick="goStep(\x27'+next+'\x27)">Suivant &rarr;</button></div>':
    '<div class="brow"><button class="btn btn-g" onclick="rstStep(\x27'+sk+'\x27)">Réessayer</button></div>';
  document.getElementById('fb-'+sk).innerHTML='<div class="fb '+(ok?'ok':'ko')+'"><p class="fb-t">'+(ok?'&#10003; Correct':'&#10007; Pas tout à fait')+'</p><p class="fb-x">'+expl+'</p>'+nb+'</div>'+extra;
}

function rstStep(sk){
  stepSel[sk]=undefined;
  document.querySelectorAll('#opts-'+sk+' .opt').forEach((o,i)=>{o.className='opt';o.style.cursor='pointer';o.onclick=()=>selOpt(sk,i);});
  let i=0;while(document.getElementById('inp-'+sk+'-'+i)){const e=document.getElementById('inp-'+sk+'-'+i);e.value='';e.className='';e.disabled=false;i++;}
  const v=document.getElementById('val-'+sk);if(v){v.style.display='inline-flex';v.disabled=true;}
  document.getElementById('fb-'+sk).innerHTML='';
}

function renderGrid(){
  document.getElementById('blocsGrid').innerHTML=BLOCS.map(b=>{
    const done=b.lecons.filter(l=>leconDone[l.id]).length;
    const pct=b.lecons.length?Math.round((done/b.lecons.length)*100):0;
    return '<div class="bloc-card" onclick="showBloc(\x27'+b.id+'\x27)">'+
      '<div class="bloc-icon">'+b.icon+'</div>'+
      '<div class="bloc-name">'+b.name+'</div>'+
      '<div class="bloc-desc">'+b.desc+'</div>'+
      '<div class="bloc-meta"><span class="bloc-count">'+b.lecons.length+' leçon'+(b.lecons.length>1?'s':'')+'</span>'+
      '<div class="bloc-prog-bar"><div class="bloc-prog-fill" style="width:'+pct+'%"></div></div></div></div>';
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}

renderGrid();
</script>
</body>
</html>
