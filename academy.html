// ── STORAGE ──────────────────────────────────────────────────
const KEY = 'kora_react_v3';
function save(d){ try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){} }
function load(){ try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return null;} }
function fresh(){ return {done:{},steps:{},exData:{},lastLecon:null}; }
let APP = load() || fresh();
let CUR = null;

// ── UTILS ─────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function el(id){ return document.getElementById(id); }
function showPage(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); el('page-'+id).classList.add('active'); window.scrollTo(0,0); }
function getSteps(l){ return l.steps.map(s=>s.id); }

// ── LIST ──────────────────────────────────────────────────────
function renderList(){
  CUR=null;
  const done=LECONS.filter(l=>APP.done[l.id]).length;
  const pct=Math.round(done/LECONS.length*100);
  el('htitle').textContent='Kora Academy';
  el('prog-wrap').style.display='none';
  el('nav-et').style.display='none';
  el('bc').innerHTML='<span class="bca">React &amp; JSX</span>';
  el('statDone').textContent=done;
  el('statPct').textContent=pct+'%';
  el('llist').innerHTML=LECONS.map((l,i)=>{
    const d=APP.done[l.id];
    return `<div class="li${d?' done':''}" data-id="${l.id}">
      <div class="lnum${d?' ok':''}">${d?'&#10003;':i+1}</div>
      <div class="linf"><div class="ltit">Le&#231;on ${l.num} &mdash; ${l.titre}</div><div class="lsub">${l.sous}</div></div>
      <span class="lbadge ${d?'fin':'new'}">${d?'Termin&#233;e':'Nouveau'}</span>
    </div>`;
  }).join('');
  const allDone=done===LECONS.length;
  el('evalZone').innerHTML=`<div class="eval-card">
    <h3>&#127919; &#201;valuation finale</h3>
    <p>Compl&#232;te les 10 le&#231;ons pour d&#233;bloquer l&#8217;&#233;valuation et gagner tes tokens KRT.</p>
    ${allDone?'<button class="btn btn-p" id="evalBtn">Commencer l&#8217;&#233;valuation &rarr;</button>'
    :`<button class="btn btn-g" disabled>Commencer l&#8217;&#233;valuation &rarr;</button><p class="eval-lock">${done}/10 termin&#233;es</p>`}
  </div>`;
  el('llist').onclick=e=>{const it=e.target.closest('.li');if(it)showLecon(it.dataset.id);};
  const eb=el('evalBtn');if(eb)eb.onclick=()=>alert('&#201;valuation &#224; venir !');
  showPage('list');
}

// ── LECON ─────────────────────────────────────────────────────
function showLecon(lid){
  CUR=LECONS.find(l=>l.id===lid);
  if(!CUR)return;
  if(!APP.steps[lid])APP.steps[lid]={current:CUR.steps[0].id,done:[]};
  APP.lastLecon=lid; save(APP);
  el('htitle').textContent=CUR.titre;
  el('prog-wrap').style.display='flex';
  el('bc').innerHTML=`<span class="bcl" id="bcList">React &amp; JSX</span><span class="bcs"> &rsaquo; </span><span class="bca">${CUR.titre}</span>`;
  el('ltag').innerHTML=`React &middot; Le&#231;on ${CUR.num}`;
  el('lh').innerHTML=`${CUR.titre} &mdash; <span class="grad">${CUR.sous}</span>`;
  el('bcList').onclick=()=>renderList();
  renderLecon();
  showPage('lecon');
}

function renderLecon(){
  if(!CUR)return;
  const lid=CUR.id,sd=APP.steps[lid];
  const steps=CUR.steps,cur=sd.current;
  const labelsMap={intro:'Pourquoi',observe:'Observer',resume:'R&#233;sum&#233;'};
  el('nav-et').style.display='flex';
  el('nav-et').innerHTML=steps.map((s,i)=>{
    const d=sd.done.includes(s.id),a=s.id===cur;
    const lbl=labelsMap[s.id]||(s.label||'Ex.'+(i-1));
    return `<button class="et ${d?'done':a?'active':''}" data-step="${s.id}">
      <span class="edot ${d?'done':a?'active':'idle'}">${d?'&#10003;':i+1}</span>${lbl}
    </button>`;
  }).join('');
  const idx=steps.findIndex(s=>s.id===cur);
  const pct=steps.length>1?Math.round(idx/(steps.length-1)*100):0;
  el('pfill').style.width=pct+'%';
  el('ppct').textContent=pct+'%';
  el('nav-et').onclick=e=>{const b=e.target.closest('.et');if(b)goStep(b.dataset.step);};
  el('screens').innerHTML=renderStep(steps.find(s=>s.id===cur));
  bindAll();
}

// ── RENDER STEPS ─────────────────────────────────────────────
function renderStep(step){
  if(!step)return '';
  const lid=CUR.id,sd=APP.steps[lid];
  const steps=CUR.steps,cur=step.id;
  const idx=steps.findIndex(s=>s.id===cur);
  const next=idx<steps.length-1?steps[idx+1].id:null;

  if(step.type==='intro') return renderIntro(step,next);
  if(step.type==='observe') return renderObserve(step,next);
  if(step.type==='resume') return renderResume();
  if(step.type==='ordre') return renderOrdre(step,next,lid);
  if(step.type==='devinette') return renderDevinette(step,next,lid);
  if(step.type==='integration') return renderIntegration(step,next,lid);
  return '';
}

function renderIntro(step,next){
  const c=step.contenu;
  const pts=c.ce_que_fait_react.map(p=>`<div class="point"><span class="pdot"></span><span>${p}</span></div>`).join('');
  return `<div class="screen active">
    <div class="card c-warm">
      <span class="slabel">Le probl&#232;me</span>
      <p class="btext">${c.texte}</p>
      <div style="display:flex;gap:8px;align-items:flex-start;padding:10px 12px;background:rgba(107,31,42,.04);border-radius:8px;border:1px solid rgba(107,31,42,.08)">
        <span style="color:var(--b3);flex-shrink:0;margin-top:2px">&#9830;</span>
        <span style="font-size:.84rem;color:var(--b1);line-height:1.6">${c.exemple}</span>
      </div>
    </div>
    <div class="card">
      <div class="cmp">
        <div class="cmp-side bad">
          <div class="cmp-title">&#10007; ${c.comparaison.sans.titre}</div>
          <pre>${esc(c.comparaison.sans.code)}</pre>
          <div class="cmp-note">${c.comparaison.sans.commentaire}</div>
        </div>
        <div class="cmp-side good">
          <div class="cmp-title">&#10003; ${c.comparaison.avec.titre}</div>
          <pre>${esc(c.comparaison.avec.code)}</pre>
          <div class="cmp-note">${c.comparaison.avec.commentaire}</div>
        </div>
      </div>
    </div>
    <div class="card c-green">
      <span class="slabel">Ce que tu vas apprendre dans cette le&#231;on</span>
      <div class="points">${pts}</div>
    </div>
    ${next?`<button class="btn btn-p" data-goto="${next}">J&#8217;ai compris &mdash; observer le code &rarr;</button>`:''}
  </div>`;
}

function renderObserve(step,next){
  const rows=step.lignes.map(l=>{
    const mt=!l.code||!l.code.trim();
    return `<div class="obs-row">
      <div class="obs-code${mt?' mt':''}">${esc(l.code)||' '}</div>
      ${l.expl?`<div class="obs-expl">&#128161; ${l.expl}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="screen active">
    <div class="card">
      <span class="slabel">&#128270; ${step.titre}</span>
      <p style="font-size:.81rem;color:var(--mu);margin-bottom:.7rem;line-height:1.5">Code &#224; gauche, explication &#224; droite. Lis chaque ligne avant de continuer.</p>
      <div class="obs">${rows}</div>
    </div>
    ${next?`<button class="btn btn-p" data-goto="${next}">C&#8217;est clair &mdash; exercice 1 &rarr;</button>`:''}
  </div>`;
}

function renderResume(){
  const items=CUR.resume.map(r=>`<div class="ri"><div class="ric">${r.icon}</div><div class="rik">${r.key}</div><div class="riv">${r.val}</div></div>`).join('');
  return `<div class="screen active">
    <div class="card c-warm">
      <span class="slabel">&#10022; R&#233;sum&#233; &mdash; ce que tu retiens de cette le&#231;on</span>
      <div class="rgrid">${items}</div>
      <div class="rfooter"><p>Tokens KRT attribu&#233;s &#224; l&#8217;&#233;valuation finale selon ta note globale.</p></div>
    </div>
    <div class="brow">
      <button class="btn btn-g" data-goto="intro">&#8592; Revoir depuis le d&#233;but</button>
      <button class="btn btn-p" id="finBtn">&#10003; Terminer cette le&#231;on</button>
    </div>
  </div>`;
}

function renderOrdre(step,next,lid){
  const sk=lid+'-'+step.id;
  const saved=APP.exData[sk];
  if(saved){
    const correct=saved.isCorrect;
    const itemsHtml=saved.placed.map((pidx,i)=>{
      const ok=pidx===step.bonne[i];
      return `<div class="ordre-item ${ok?'placed':'wrong'}">
        <span class="ordre-num">${i+1}</span>
        <span>${esc(step.items[pidx])}</span>
      </div>`;
    }).join('');
    return `<div class="screen active"><div class="card">
      <div class="trow"><span class="tag tag-ordre">Remettre en ordre</span></div>
      <p class="btext"><strong>${step.titre}</strong></p>
      <div class="ex-ctx">${step.contexte}</div>
      <div class="ordre-area">${itemsHtml}</div>
      <div class="fb ${correct?'ok':'ko'}">
        <p class="fbt">${correct?'&#10003; Parfait !':'&#10007; Pas tout &#224; fait'}</p>
        <p class="fbx">${step.explication}</p>
        ${correct?`<div class="brow"><button class="btn btn-o" data-goto="${next}">Suivant &rarr;</button></div>`:`<div class="brow"><button class="btn btn-g" data-redo="${sk}">R&#233;essayer</button></div>`}
      </div>
    </div></div>`;
  }
  // État initial — mélange
  const shuffled=[...step.items].map((it,i)=>({it,oi:i})).sort(()=>Math.random()-.5);
  const melHtml=shuffled.map((s,i)=>`<div class="mel-item" data-oi="${s.oi}">${esc(s.it)}</div>`).join('');
  const slotsHtml=step.items.map((_,i)=>`<div class="ordre-item" data-slot="${i}"><span class="ordre-num">${i+1}</span><span class="slot-txt" style="color:var(--li)">&#8212; clique un &#233;l&#233;ment ci-dessus &#8212;</span></div>`).join('');
  return `<div class="screen active"><div class="card">
    <div class="trow"><span class="tag tag-ordre">Remettre en ordre</span></div>
    <p class="btext"><strong>${step.titre}</strong></p>
    <div class="ex-ctx">${step.contexte}</div>
    <p style="font-size:.8rem;color:var(--mu);margin-bottom:.5rem">1. Clique un &#233;l&#233;ment pour le s&#233;lectionner. 2. Clique une position pour le placer.</p>
    <div class="melange" id="mel-${sk}">${melHtml}</div>
    <div class="ordre-area" id="slots-${sk}">${slotsHtml}</div>
    <div id="fb-${sk}"></div>
    <div class="brow"><button class="btn btn-p" id="val-${sk}" disabled>V&#233;rifier l&#8217;ordre</button></div>
  </div></div>`;
}

function renderDevinette(step,next,lid){
  const sk=lid+'-'+step.id;
  const saved=APP.exData[sk];
  const choixHtml=step.choix.map((c,i)=>{
    let cls='';
    if(saved){cls=i===step.bonne?'ok':(i===saved.sel&&saved.sel!==step.bonne?'ko':'');}
    return `<button class="dev${cls?' '+cls:''}" data-idx="${i}" ${saved?'disabled':''}><span class="dltr">${['A','B','C'][i]}</span>${c}</button>`;
  }).join('');
  const fb=saved?`<div class="fb ${saved.ok?'ok':'ko'}">
    <p class="fbt">${saved.ok?'&#10003; Bonne r&#233;ponse !':'&#10007; Pas tout &#224; fait'}</p>
    <p class="fbx">${step.explication}</p>
    ${saved.ok?`<div class="brow"><button class="btn btn-o" data-goto="${next}">Suivant &rarr;</button></div>`:`<div class="brow"><button class="btn btn-g" data-redo="${sk}">R&#233;essayer</button></div>`}
  </div>`:'';
  return `<div class="screen active"><div class="card">
    <div class="trow"><span class="tag tag-dev">Devinette</span></div>
    <p class="btext"><strong>${step.titre}</strong></p>
    <p style="font-size:.88rem;color:var(--tx);margin-bottom:.9rem;line-height:1.6">${step.question}</p>
    <div class="devs" id="devs-${sk}">${choixHtml}</div>
    <div id="fb-${sk}">${fb}</div>
    ${!saved?`<div class="brow"><button class="btn btn-p" id="val-${sk}" disabled>V&#233;rifier</button></div>`:''}
  </div></div>`;
}

function renderIntegration(step,next,lid){
  const sk=lid+'-'+step.id;
  const saved=APP.exData[sk];
  const inputs=step.labels.map((lbl,i)=>{
    const v=saved?saved.vals[i]||'':'';
    const cls=saved?(saved.ok[i]?' ok':' ko'):'';
    return `<div class="igrp"><label>${['[A]','[B]','[C]'][i]} &mdash; ${lbl}</label><input data-sk="${sk}" data-ci="${i}" value="${v.replace(/"/g,'&quot;')}" ${saved?'disabled':''} placeholder="ta r&#233;ponse&#8230;" class="${cls.trim()}"></div>`;
  }).join('');
  const mkPrev=(vals)=>{
    let t=step.template;
    step.labels.forEach((_,i)=>{ t=t.replace(['[A]','[B]','[C]'][i],vals&&vals[i]?vals[i]:'[?]'); });
    return t;
  };
  const fb=saved?`<div class="fb ${saved.allOk?'ok':'ko'}">
    <p class="fbt">${saved.allOk?'&#10003; Correct !':'&#10007; Presque &mdash; v&#233;rifie les cases rouges'}</p>
    <p class="fbx">${saved.allOk?'Bien jou&#233; ! Tu peux passer &#224; la suite.':'R&#233;ponses attendues : <code style="background:#eee;padding:1px 5px;border-radius:3px;font-size:.8rem">'+step.bonnes.map(b=>b.replace(/</g,'&lt;').replace(/>/g,'&gt;')).join('</code> · <code style="background:#eee;padding:1px 5px;border-radius:3px;font-size:.8rem">') + '</code>'}</p>
    ${saved.allOk?`<div class="brow"><button class="btn btn-o" data-goto="${next}">Suivant &rarr;</button></div>`:`<div class="brow"><button class="btn btn-g" data-redo="${sk}">R&#233;essayer</button></div>`}
  </div>`:'';
  return `<div class="screen active"><div class="card">
    <div class="trow"><span class="tag tag-int">Int&#233;gration</span></div>
    <p class="btext"><strong>${step.titre}</strong></p>
    <div class="ex-ctx">${step.contexte}</div>
    <p style="font-size:.86rem;color:var(--tx);margin-bottom:.7rem">${step.instruction}</p>
    <div class="irow">${inputs}</div>
    <pre class="tpl" id="prev-${sk}">${esc(mkPrev(saved?saved.vals:null))}</pre>
    <div class="aide">&#128161; ${step.aide}</div>
    <div id="fb-${sk}">${fb}</div>
    ${!saved?`<div class="brow"><button class="btn btn-p" id="val-${sk}" disabled>V&#233;rifier</button></div>`:''}
  </div></div>`;
}

// ── BIND EVENTS ───────────────────────────────────────────────
function bindAll(){
  // goto
  document.querySelectorAll('[data-goto]').forEach(b=>b.onclick=()=>goStep(b.dataset.goto));
  // logo/nav
  el('logoBtn').onclick=()=>renderList();
  el('navList').onclick=()=>renderList();
  // fin
  const fin=el('finBtn');if(fin)fin.onclick=()=>finirLecon();
  // redo
  document.querySelectorAll('[data-redo]').forEach(b=>b.onclick=()=>{delete APP.exData[b.dataset.redo];save(APP);renderLecon();});

  if(!CUR)return;
  const lid=CUR.id,sd=APP.steps[lid];
  const step=CUR.steps.find(s=>s.id===sd.current);
  if(!step)return;
  const sk=lid+'-'+step.id;
  const saved=APP.exData[sk];

  // ORDRE
  if(step.type==='ordre'&&!saved){
    const mel=el('mel-'+sk);
    const slotsEl=el('slots-'+sk);
    const valBtn=el('val-'+sk);
    let selOI=null;
    const placed={};

    mel.onclick=e=>{
      const it=e.target.closest('.mel-item');
      if(!it||it.classList.contains('used'))return;
      mel.querySelectorAll('.mel-item').forEach(x=>x.classList.remove('sel'));
      it.classList.add('sel');
      selOI=parseInt(it.dataset.oi);
    };

    slotsEl.onclick=e=>{
      const slot=e.target.closest('[data-slot]');
      if(!slot||selOI===null)return;
      const slotIdx=parseInt(slot.dataset.slot);
      // Si slot déjà occupé, remettre l'ancien dans le mélange
      if(placed[slotIdx]!==undefined){
        const oldOI=placed[slotIdx];
        mel.querySelector(`[data-oi="${oldOI}"]`).classList.remove('used');
      }
      placed[slotIdx]=selOI;
      mel.querySelector(`[data-oi="${selOI}"]`).classList.add('used','sel');
      mel.querySelectorAll('.mel-item').forEach(x=>x.classList.remove('sel'));
      slot.querySelector('.slot-txt').textContent=step.items[selOI];
      slot.classList.add('placed');
      selOI=null;
      // Vérifier si tous placés
      const allPlaced=step.items.every((_,i)=>placed[i]!==undefined);
      if(valBtn)valBtn.disabled=!allPlaced;
    };

    if(valBtn) valBtn.onclick=()=>{
      const placedArr=step.items.map((_,i)=>placed[i]??-1);
      const isCorrect=placedArr.every((pi,i)=>pi===step.bonne[i]);
      APP.exData[sk]={placed:placedArr,isCorrect};save(APP);renderLecon();
    };
  }

  // DEVINETTE
  if(step.type==='devinette'&&!saved){
    const valBtn=el('val-'+sk);
    let sel=null;
    document.querySelectorAll('.dev:not([disabled])').forEach(d=>{
      d.onclick=()=>{
        sel=parseInt(d.dataset.idx);
        document.querySelectorAll('.dev').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        if(valBtn)valBtn.disabled=false;
      };
    });
    if(valBtn)valBtn.onclick=()=>{
      if(sel===null)return;
      const ok=sel===step.bonne;
      APP.exData[sk]={sel,ok};save(APP);renderLecon();
    };
  }

  // INTEGRATION
  if(step.type==='integration'&&!saved){
    const valBtn=el('val-'+sk);
    const inputs=document.querySelectorAll(`[data-sk="${sk}"]`);
    const prev=el('prev-'+sk);
    function upPrev(){
      let t=step.template;
      inputs.forEach((inp,i)=>{t=t.replace(['[A]','[B]','[C]'][i],inp.value||['[?]','[?]','[?]'][i]);});
      if(prev)prev.textContent=t;
      if(valBtn)valBtn.disabled=!Array.from(inputs).every(inp=>inp.value.trim());
    }
    inputs.forEach(inp=>inp.oninput=upPrev);
    if(valBtn)valBtn.onclick=()=>{
      const vals=Array.from(inputs).map(inp=>inp.value.trim());
      const norm=s=>s.replace(/\s+/g,'').toLowerCase();const ok=vals.map((v,i)=>norm(v)===norm(step.bonnes[i]));
      const allOk=ok.every(Boolean);
      APP.exData[sk]={vals,ok,allOk};save(APP);renderLecon();
    };
  }
}

// ── NAV ───────────────────────────────────────────────────────
function goStep(sid){
  if(!CUR)return;
  const lid=CUR.id,sd=APP.steps[lid];
  if(!sd.done.includes(sd.current))sd.done.push(sd.current);
  sd.current=sid;save(APP);renderLecon();window.scrollTo(0,0);
}

function finirLecon(){
  if(!CUR)return;
  APP.done[CUR.id]=true;
  const idx=LECONS.findIndex(l=>l.id===CUR.id);
  if(idx<LECONS.length-1){
    APP.lastLecon=LECONS[idx+1].id;
  }
  save(APP);
  renderList();
}

// ── INIT ──────────────────────────────────────────────────────
if(APP.lastLecon&&!APP.done[APP.lastLecon]){
  showLecon(APP.lastLecon);
}else{
  renderList();
}
</script>
</body>
