<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kora Academy — React & JSX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAFA;--w:#FFF;--line:#EFEFEF;--tx:#1A1A1A;--mu:#737373;--li:#B0B0B0;--b1:#6B1F2A;--b2:#C4622D;--b3:#E8956D;--arc:#6BAED6;--grad:linear-gradient(135deg,#6B1F2A 0%,#C4622D 50%,#E8956D 100%);--ok:#4caf50;--ko:#e57373;--purple:#7B5EA7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif;font-weight:300;min-height:100vh;padding-bottom:90px}
/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--line)}
.logo{height:36px;border-radius:8px;padding:3px;box-shadow:0 0 0 1.5px var(--b2),0 0 0 3px rgba(232,149,109,.2);cursor:pointer}
.htitle{font-family:"Fraunces",serif;font-size:.95rem;color:var(--tx);margin-left:10px}
.pw{display:flex;align-items:center;gap:8px}
.pb{width:80px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--grad);border-radius:2px;transition:width .4s;width:0%}
.pp{font-size:.72rem;color:var(--mu);min-width:28px;text-align:right}
.bc{display:flex;align-items:center;gap:6px;padding:8px 18px;font-size:.8rem;color:var(--mu);border-bottom:1px solid var(--line);min-height:36px;flex-wrap:wrap}
.bcl{cursor:pointer;transition:color .15s}.bcl:hover{color:var(--b1)}.bcs{color:var(--line)}.bca{color:var(--b1);font-weight:500}
.nav-et{display:flex;padding:0 12px;overflow-x:auto;border-bottom:1px solid var(--line)}.nav-et::-webkit-scrollbar{height:0}
.et{display:flex;align-items:center;gap:4px;padding:8px 9px;font-size:.74rem;font-family:"DM Sans",sans-serif;color:var(--li);background:transparent;border:none;cursor:pointer;white-space:nowrap;position:relative;transition:color .2s}
.et.done{color:var(--b2)}.et.active{color:var(--b1);font-weight:500}
.et.active::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);border-radius:2px 2px 0 0}
.edot{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0}
.edot.done{background:var(--grad);color:#fff}.edot.active{background:rgba(107,31,42,.1);color:var(--b1);border:1.5px solid var(--b1)}.edot.idle{background:var(--line);color:var(--li)}
/* PAGES */
.page{display:none}.page.active{display:block}
.wrap{max-width:660px;margin:0 auto;padding:1.5rem 1rem}
/* LIST */
.hero{text-align:center;padding:1.8rem 1rem 1.2rem;max-width:580px;margin:0 auto}
.hero h2{font-family:"Fraunces",serif;font-size:clamp(1.4rem,4vw,1.9rem);font-weight:300;letter-spacing:-.03em;line-height:1.3;margin-bottom:.6rem}
.hero p{font-size:.86rem;color:var(--mu);line-height:1.7;max-width:400px;margin:0 auto 1.3rem}
.stats{display:flex;justify-content:center;gap:24px;margin-bottom:1.5rem}
.sn{font-family:"Fraunces",serif;font-size:1.8rem;color:var(--b1);line-height:1;text-align:center}
.sl{font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;text-align:center}
.llist{display:flex;flex-direction:column;gap:8px;padding:0 1rem;max-width:660px;margin:0 auto}
.li{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--w);border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:all .15s}
.li:hover{border-color:rgba(196,98,45,.25);background:#FFFAF8}.li.done{border-color:rgba(76,175,80,.2);background:#F5FBF5}
.lnum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:600;flex-shrink:0;background:var(--grad);color:#fff}
.lnum.ok{background:linear-gradient(135deg,#4caf50,#81c784)}
.linf{flex:1}.ltit{font-size:.87rem;font-weight:400;color:var(--tx);margin-bottom:2px}.lsub{font-size:.72rem;color:var(--mu)}
.lbadge{font-size:.67rem;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.new{color:var(--b2);background:rgba(196,98,45,.1);border:1px solid rgba(196,98,45,.2)}
.fin{color:#2e7d32;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.2)}
/* LECON HEADER */
.ltag{display:inline-flex;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500;color:var(--arc);background:rgba(107,174,214,.1);border:1px solid rgba(107,174,214,.3);border-radius:20px;padding:2px 10px;margin-bottom:9px}
h1.lh{font-family:"Fraunces",serif;font-size:clamp(1.2rem,3.5vw,1.7rem);font-weight:400;letter-spacing:-.03em;line-height:1.2;margin-bottom:1.3rem}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic}
/* CARDS */
.card{border:1px solid var(--line);border-radius:14px;padding:1.2rem;margin-bottom:.9rem;background:var(--w)}
.c-warm{background:rgba(107,31,42,.03);border-color:rgba(107,31,42,.1)}
.c-blue{background:rgba(107,174,214,.04);border-color:rgba(107,174,214,.2)}
.c-green{background:rgba(76,175,80,.03);border-color:rgba(76,175,80,.15)}
.c-purple{background:rgba(123,94,167,.04);border-color:rgba(123,94,167,.2)}
.slabel{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--b2);margin-bottom:.6rem;display:block}
.btext{font-size:.91rem;line-height:1.75;color:var(--tx);margin-bottom:.8rem}
/* CODE */
pre{background:#FDF6F0;border:1px solid rgba(107,31,42,.1);border-left:3px solid var(--b2);border-radius:10px;padding:.85rem .95rem;font-family:"JetBrains Mono",monospace;font-size:.77rem;line-height:1.85;color:var(--tx);overflow-x:auto;white-space:pre;margin-bottom:.8rem}
/* OBSERVE */
.obs{display:flex;flex-direction:column;gap:6px;margin-bottom:.7rem}
.obs-row{background:var(--w);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.obs-code{display:block;background:#FDF6F0;padding:5px 11px;font-family:"JetBrains Mono",monospace;font-size:.75rem;line-height:1.7;color:var(--tx);white-space:pre;overflow-x:auto;border-left:3px solid var(--b2)}
.obs-code.mt{background:#FAFAFA;border-left-color:var(--line);color:var(--li)}
.obs-expl{display:block;background:#F5F0FF;padding:5px 11px;font-size:.75rem;color:#4A3070;font-family:"DM Sans",sans-serif;line-height:1.5;border-top:1px solid #E8DCFF}
/* COMPARAISON */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.8rem}
@media(max-width:520px){.cmp{grid-template-columns:1fr}}
.cmp-side{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cmp-title{font-size:.72rem;font-weight:500;padding:6px 10px;background:var(--bg);color:var(--mu);border-bottom:1px solid var(--line)}
.cmp-side.bad .cmp-title{background:rgba(229,115,115,.07);color:#c62828}
.cmp-side.good .cmp-title{background:rgba(76,175,80,.07);color:#2e7d32}
.cmp-side pre{margin:0;border-radius:0;border:none;border-left:none;font-size:.72rem}
.cmp-note{font-size:.75rem;color:var(--mu);padding:6px 10px;background:#FAFAFA;border-top:1px solid var(--line);line-height:1.5}
/* LISTE POINTS */
.points{display:flex;flex-direction:column;gap:6px;margin-top:.6rem}
.point{display:flex;align-items:flex-start;gap:8px;font-size:.85rem;color:var(--tx);line-height:1.5}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--b2);flex-shrink:0;margin-top:7px}
/* BTNS */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:22px;padding:10px 20px;font-family:"DM Sans",sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.btn-p{background:var(--grad);color:#fff}.btn-p:hover{opacity:.88}
.btn-o{background:transparent;color:var(--b1);border:1px solid rgba(107,31,42,.25)}
.btn-g{background:transparent;color:var(--mu);border:1px solid var(--line)}
.btn:disabled{opacity:.35;cursor:default}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
.tag{display:inline-flex;border-radius:20px;padding:3px 11px;font-size:.67rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tag-ordre{color:var(--purple);background:rgba(123,94,167,.1);border:1px solid rgba(123,94,167,.3)}
.tag-dev{color:var(--arc);background:rgba(107,174,214,.1);border:1px solid rgba(107,174,214,.3)}
.tag-int{color:var(--b2);background:rgba(196,98,45,.1);border:1px solid rgba(196,98,45,.25)}
.trow{display:flex;gap:6px;margin-bottom:.9rem;flex-wrap:wrap}
/* EX CONTEXTE */
.ex-ctx{font-size:.81rem;color:var(--arc);background:rgba(107,174,214,.07);border:1px solid rgba(107,174,214,.2);border-radius:8px;padding:8px 12px;margin-bottom:.8rem;line-height:1.5}
/* ORDRE */
.ordre-area{display:flex;flex-direction:column;gap:0;margin-bottom:.8rem}
.ordre-item{padding:9px 12px;background:var(--w);border:1px solid var(--line);border-radius:0;font-family:"JetBrains Mono",monospace;font-size:.78rem;line-height:1.5;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;border-bottom:none}
.ordre-item:first-child{border-radius:8px 8px 0 0}
.ordre-item:last-child{border-radius:0 0 8px 8px;border-bottom:1px solid var(--line)}
.ordre-item.sel{background:#FDF6F0;border-color:var(--b2);z-index:1;position:relative}
.ordre-item.placed{background:#F0F8F0;border-color:var(--ok);color:var(--tx)}
.ordre-item.wrong{background:#FDF0F0;border-color:var(--ko)}
.ordre-num{width:20px;height:20px;border-radius:50%;background:var(--line);color:var(--mu);font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:"DM Sans",sans-serif}
.ordre-num.active-n{background:var(--b2);color:#fff}
.melange{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.9rem;padding:.8rem;background:#FAFAFA;border:1px solid var(--line);border-radius:10px}
.mel-item{padding:7px 12px;background:var(--w);border:1px solid var(--line);border-radius:8px;font-family:"JetBrains Mono",monospace;font-size:.77rem;cursor:pointer;transition:all .15s}
.mel-item:hover{border-color:var(--b2);background:#FDF6F0}
.mel-item.sel{border-color:var(--b2);background:#FDF6F0;font-weight:500}
.mel-item.used{opacity:.3;cursor:default;pointer-events:none}
/* DEVINETTE */
.devs{display:flex;flex-direction:column;gap:8px;margin-bottom:.9rem}
.dev{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:var(--w);cursor:pointer;font-size:.86rem;font-family:"DM Sans",sans-serif;color:var(--mu);text-align:left;transition:all .15s;width:100%}
.dev:hover:not([disabled]){border-color:var(--b2);color:var(--b1);background:#FDF6F0}
.dev.sel{border-color:var(--b2);color:var(--b1);background:#FDF6F0}
.dev.ok{border-color:var(--ok);color:#2e7d32;background:#F0F8F0}
.dev.ko{border-color:var(--ko);color:#c62828;background:#FDF0F0}
.dltr{font-size:.85rem;font-weight:700;opacity:.5;flex-shrink:0;width:16px}
/* INTEGRATION */
.irow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.8rem}
.igrp label{font-size:.72rem;color:var(--mu);display:block;margin-bottom:3px;font-family:"JetBrains Mono",monospace}
.igrp input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:.82rem;font-family:"JetBrains Mono",monospace;background:var(--w);color:var(--tx);outline:none;width:220px;transition:border-color .2s}
.igrp input:focus{border-color:var(--b2)}.igrp input.ok{border-color:var(--ok);background:#F0F8F0}.igrp input.ko{border-color:var(--ko);background:#FDF0F0}
pre.tpl{background:#F5F0FF;border-color:#D4C4F5;border-left-color:var(--purple)}
.aide{font-size:.81rem;color:#4A3070;background:rgba(123,94,167,.06);border:1px solid rgba(123,94,167,.18);border-radius:8px;padding:8px 12px;margin:.5rem 0;line-height:1.5}
/* FB */
.fb{border-radius:10px;padding:.9rem;margin-top:.8rem}
.fb.ok{background:#F0F8F0;border:1px solid var(--ok)}.fb.ko{background:#FDF0F0;border:1px solid var(--ko)}
.fbt{font-weight:600;font-size:.87rem;margin-bottom:4px}
.fb.ok .fbt{color:#2e7d32}.fb.ko .fbt{color:#c62828}
.fbx{color:var(--mu);font-size:.82rem;line-height:1.6}
/* RESUME */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:.9rem}
.ri{background:var(--w);border:1px solid var(--line);border-radius:10px;padding:.85rem}
.ric{font-size:1rem;margin-bottom:.25rem}
.rik{font-family:"JetBrains Mono",monospace;font-size:.74rem;color:var(--b1);margin-bottom:.2rem;font-weight:500}
.riv{font-size:.79rem;color:var(--mu);line-height:1.5}
.rfooter{border-top:1px solid rgba(107,31,42,.1);padding-top:.8rem;margin-top:.3rem}
/* EVAL */
.eval-card{background:linear-gradient(135deg,rgba(107,31,42,.04),rgba(232,149,109,.06));border:1px solid rgba(196,98,45,.2);border-radius:16px;padding:1.4rem;text-align:center;margin:1.3rem 1rem}
.eval-card h3{font-family:"Fraunces",serif;font-size:1.05rem;font-weight:400;color:var(--tx);margin-bottom:.35rem}
.eval-card p{font-size:.82rem;color:var(--mu);line-height:1.6;margin-bottom:.8rem}
.eval-lock{font-size:.79rem;color:var(--li);margin-top:.35rem}
/* MOB NAV */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:200;padding:5px 0}
.mobi{display:flex;justify-content:space-around}
.mitem{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.65rem;color:var(--li);cursor:pointer;padding:4px 14px;transition:color .15s;text-decoration:none}
.mitem.active{color:var(--b1)}.mic{font-size:1.25rem;line-height:1.2}
@media(max-width:680px){.mobnav{display:block}}
@media(max-width:480px){.wrap{padding:1.2rem .75rem}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div style="display:flex;align-items:center">
      <img src="logo.jpg" alt="Kora" class="logo" id="logoBtn">
      <span class="htitle" id="htitle">Kora Academy</span>
    </div>
    <div class="pw" id="prog-wrap" style="display:none">
      <div class="pb"><div class="pf" id="pfill"></div></div>
      <span class="pp" id="ppct">0%</span>
    </div>
  </div>
  <div class="bc" id="bc"><span class="bca">React &amp; JSX</span></div>

</div>

<div class="page active" id="page-list">
  <div class="hero">
    <h2>React &amp; JSX &mdash; <em class="grad">Apprendre en faisant</em></h2>
    <p>10 le&#231;ons progressives. Chacune : comprendre le probl&#232;me, observer le code, s&#8217;exercer. Exemples tir&#233;s de Kora et DB Studio.</p>
    <div class="stats">
      <div><div class="sn" id="statDone">0</div><div class="sl">termin&#233;es</div></div>
      <div><div class="sn">10</div><div class="sl">le&#231;ons</div></div>
      <div><div class="sn" id="statPct">0%</div><div class="sl">progression</div></div>
    </div>
  </div>
  <div class="llist" id="llist"></div>
  <div id="evalZone"></div>
</div>

<div class="page" id="page-lecon">
  <div class="wrap">
    <div class="ltag" id="ltag"></div>
    <h1 class="lh" id="lh"></h1>
    <div id="screens"></div>
  </div>
</div>

<div class="mobnav">
  <div class="mobi">
    <a href="index.html" class="mitem"><span class="mic">&#8962;</span>Accueil</a>
    <div class="mitem active" id="navList"><span class="mic">&#10010;</span>Formation</div>

  </div>
</div>

<script>
const LECONS = [{"id":"r1","num":1,"titre":"React — C'est quoi et pourquoi","sous":"Le problème que React résout","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Le problème des interfaces dynamiques","contenu":{"texte":"Tu connais HTML et CSS — tu sais créer des pages. Mais une page qui réagit : boutons qui changent, données qui s'actualisent, contenu qui apparaît et disparaît selon les actions... En HTML/CSS pur c'est impossible. Il faut du code qui tourne dans le navigateur. C'est là qu'arrive JavaScript — et React est une bibliothèque JavaScript créée par Facebook en 2013 pour construire des interfaces dynamiques plus facilement.","exemple":"Imagine le fil d'actualité de Kora : des dizaines de posts qui se chargent, des likes qui se mettent à jour en temps réel, une barre de recherche qui filtre instantanément. Sans React, chaque interaction nécessite de retrouver les éléments dans la page et de les modifier à la main. Avec React, tu décris simplement CE QUI doit s'afficher selon l'état de l'application — React s'occupe du reste.","comparaison":{"sans":{"titre":"Sans React — Vanilla JS","code":"// Un simple compteur sans React\nlet count = 0;\n\nconst btn = document.getElementById('btn');\nconst affichage = document.getElementById('count');\n\nbtn.addEventListener('click', function() {\n  count = count + 1;\n  affichage.textContent = count; // mise à jour manuelle\n  if (count > 10) {\n    btn.style.color = 'red'; // style manuel\n    btn.textContent = 'Trop de clics !'; // texte manuel\n  }\n});\n// Chaque changement = chercher l'élément + modifier manuellement","commentaire":"Tu gères chaque modification à la main. Plus l'interface est complexe, plus c'est ingérable."},"avec":{"titre":"Avec React","code":"// Le même compteur avec React\nfunction Compteur() {\n  const [count, setCount] = useState(0);\n  // count = valeur actuelle\n  // setCount = fonction pour changer la valeur\n\n  return (\n    <button\n      onClick={() => setCount(count + 1)}\n      style={{ color: count > 10 ? 'red' : 'black' }}\n    >\n      {count > 10 ? 'Trop de clics !' : count}\n    </button>\n  );\n}\n// React met à jour la page automatiquement quand count change","commentaire":"Tu décris ce qui doit s'afficher selon l'état. React gère les mises à jour."}},"ce_que_fait_react":["Met à jour la page automatiquement quand les données changent","Permet de découper l'interface en blocs réutilisables (composants)","Gère efficacement les listes de données dynamiques","Synchronise l'interface avec les données du serveur","Utilisé par Facebook, Instagram, Airbnb, Netflix, Kora..."]}},{"id":"observe","label":"Observer","type":"observe","titre":"Anatomie d'une application React","lignes":[{"code":"// 1. On importe React et les outils nécessaires","expl":""},{"code":"import { useState } from 'react';","expl":"useState est l'outil React pour mémoriser des données."},{"code":"","expl":""},{"code":"// 2. Un composant = une fonction qui retourne du JSX","expl":""},{"code":"function BoutonKora({ texte, couleur }) {","expl":"Fonction JS normale. Le nom commence par MAJUSCULE. Entre {} : les données reçues (props)."},{"code":"  const [clique, setClique] = useState(false);","expl":"useState(false) : mémorise si le bouton a été cliqué. false = valeur de départ."},{"code":"","expl":""},{"code":"  return (","expl":"return = ce que React affiche dans la page."},{"code":"    <button","expl":"JSX : ressemble à HTML mais c'est du JavaScript."},{"code":"      style={{ background: clique ? '#4caf50' : couleur }}","expl":"Style dynamique : si cliqué → vert, sinon → couleur reçue. {} = expression JS."},{"code":"      onClick={() => setClique(true)}","expl":"Au clic : setClique(true) change la valeur → React met la page à jour."},{"code":"    >","expl":""},{"code":"      {clique ? 'Cliqué !' : texte}","expl":"Texte dynamique : si cliqué → 'Cliqué !', sinon → texte reçu."},{"code":"    </button>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""},{"code":"","expl":""},{"code":"// 3. Utilisation du composant","expl":""},{"code":"<BoutonKora texte=\"Suivre\" couleur=\"#C4622D\" />","expl":"On l'utilise comme une balise HTML. texte et couleur sont les données passées."},{"code":"<BoutonKora texte=\"Liker\" couleur=\"#6B1F2A\" />","expl":"Même composant, données différentes. Réutilisable à l'infini."}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Les lignes d'un composant React sont mélangées. Remets-les dans le bon ordre.","contexte":"Un composant qui affiche le nombre de tokens Kora.","items":["  return <p>{tokens} KRT</p>;","function TokenBadge({ tokens }) {","}","const [montant] = useState(tokens);"],"bonne":[1,3,0,2],"explication":"Structure d'un composant : 1) function Nom({ props }) { 2) const [...] = useState(...) 3) return JSX 4) }"},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"React a été créé pour résoudre quel problème précis ?","choix":["Rendre les pages web plus rapides à charger","Mettre à jour l'interface automatiquement quand les données changent, sans tout modifier à la main","Remplacer HTML et CSS par du JavaScript"],"bonne":1,"explication":"React résout le problème des mises à jour manuelles. Au lieu de chercher chaque élément et le modifier, tu décris ce qui doit s'afficher — React s'occupe de mettre à jour le DOM."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Complete ce composant React qui affiche le nom d'un utilisateur Kora et un message de bienvenue.","contexte":"Composant simple avec une prop 'nom'. Utilise ce que tu viens de voir.","labels":["prop reçue","texte affiché"],"bonnes":["{ nom }","Bienvenue {nom} sur Kora !"],"template":"function AccueilKora([A]) {\n  return (\n    <div>\n      <h1>[B]</h1>\n    </div>\n  );\n}","aide":"Les props se reçoivent entre accolades dans les paramètres. Dans le JSX, les variables s'écrivent entre {}."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🧩","key":"React = bibliothèque JS","val":"Créée par Facebook. Construit des interfaces dynamiques."},{"icon":"🔄","key":"Principe clé","val":"Tu décris ce qui doit s'afficher. React met la page à jour."},{"icon":"📦","key":"Composant","val":"Fonction JS avec Majuscule qui retourne du JSX."},{"icon":"💾","key":"useState","val":"Mémorise une valeur. Changer cette valeur = page mise à jour."}]},{"id":"r2","num":2,"titre":"Le JSX","sous":"Écrire de l'HTML dans JavaScript","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"JSX — HTML dans JavaScript","contenu":{"texte":"JSX est la syntaxe utilisée dans React pour décrire ce qui doit s'afficher. Ça ressemble à du HTML, mais c'est en réalité du JavaScript. Le navigateur ne comprend pas JSX directement — un outil appelé Babel le transforme en code JavaScript pur avant que la page se charge.","exemple":"Quand tu écris <h1>Bonjour</h1> en JSX, Babel le transforme en React.createElement('h1', null, 'Bonjour'). JSX est juste une façon plus lisible d'écrire ce code. Les règles de JSX sont presque identiques à HTML, avec quelques différences importantes à connaître.","comparaison":{"sans":{"titre":"HTML classique","code":"<!-- HTML -->\n<div class=\"carte\">\n  <h2>Ma Formation</h2>\n  <p>10 leçons</p>\n  <label for=\"input\">Nom</label>\n  <input type=\"text\" />\n</div>","commentaire":"En HTML, class= et for= sont les attributs standard."},"avec":{"titre":"JSX React","code":"// JSX — les différences avec HTML\n<div className=\"carte\">   {/* class → className */}\n  <h2>Ma Formation</h2>\n  <p>10 leçons</p>\n  <label htmlFor=\"input\">Nom</label>  {/* for → htmlFor */}\n  <input type=\"text\" />   {/* balise auto-fermante obligatoire */}\n</div>\n// Les commentaires s'écrivent {/* comme ça */} en JSX","commentaire":"className, htmlFor, balises fermées. Les {} permettent d'insérer du JavaScript."}},"ce_que_fait_react":["className à la place de class (class est un mot réservé en JS)","htmlFor à la place de for (for est réservé aussi)","Toutes les balises doivent être fermées : <img /> <br /> <input />","{variable} pour insérer une valeur JavaScript dans le JSX","Un seul élément racine par return (ou utiliser <> </>)","style={{ propriete: valeur }} — objet JavaScript pour les styles"]}},{"id":"observe","label":"Observer","type":"observe","titre":"JSX en pratique — composant carte formation","lignes":[{"code":"function CarteFormation({ titre, lecons, termine }) {","expl":"Props : titre (texte), lecons (nombre), termine (vrai/faux)."},{"code":"  return (","expl":"Un seul élément retourné. Les () permettent d'écrire sur plusieurs lignes."},{"code":"    <div className=\"carte\">","expl":"className, pas class. Équivalent de class=\"carte\" en HTML."},{"code":"      <h2 style={{ color: '#6B1F2A' }}>{titre}</h2>","expl":"style={{ }} = objet JS. Doubles accolades : les extérieures = expression JS, les intérieures = l'objet. {titre} = valeur de la prop."},{"code":"      <p>{lecons} leçons au programme</p>","expl":"On peut mélanger variable et texte dans le JSX."},{"code":"      {termine && <span className=\"badge\">✓ Terminé</span>}","expl":"Rendu conditionnel : si termine est true, affiche le span. Sinon, rien."},{"code":"      <button className=\"btn-start\">","expl":""},{"code":"        {termine ? 'Revoir' : 'Commencer'}","expl":"Ternaire : si termine → 'Revoir', sinon → 'Commencer'."},{"code":"      </button>","expl":""},{"code":"    </div>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""},{"code":"","expl":""},{"code":"// Fragment : plusieurs éléments sans div inutile","expl":""},{"code":"function Deux() {","expl":""},{"code":"  return (","expl":""},{"code":"    <>","expl":"Fragment React : wrapper invisible. Ne crée pas d'élément HTML."},{"code":"      <h1>Titre</h1>","expl":""},{"code":"      <p>Texte</p>","expl":""},{"code":"    </>","expl":"Fermeture du Fragment."},{"code":"  );","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre les mots pour former une ligne JSX valide qui affiche le prix d'une offre DB Studio.","contexte":"Balise paragraphe avec className et valeur dynamique.","items":["{prix}","<p","className=\"prix\">","€/mois</p>"],"bonne":[1,2,0,3],"explication":"Structure JSX : <balise attributs>{valeur}texte</balise>. className avant le >, {} pour insérer la variable."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Tu veux afficher un badge '⭐ Premium' seulement si l'utilisateur est premium. Quelle syntaxe JSX est correcte ?","choix":["{if (premium) <span>⭐ Premium</span>}","{premium && <span>⭐ Premium</span>}","<span if={premium}>⭐ Premium</span>"],"bonne":1,"explication":"En JSX on ne peut pas utiliser if directement. On utilise && : si premium est true, le span s'affiche. Si false, rien. C'est le rendu conditionnel en JSX."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Convertis ce HTML en JSX valide pour le site Le Napoléon.","contexte":"Header d'un site client DB Studio — convertir les attributs HTML en JSX.","labels":["attribut classe","attribut label for"],"bonnes":["className","htmlFor"],"template":"function HeaderNapoleon() {\n  return (\n    <header [A]=\"header-sombre\">\n      <nav>\n        <label [B]=\"menu\">Menu</label>\n        <input type=\"checkbox\" id=\"menu\" />\n        <img src=\"logo.jpg\" alt=\"Le Napoléon\" />\n      </nav>\n    </header>\n  );\n}","aide":"En JSX : class devient className, for devient htmlFor. Ce sont les 2 seuls attributs qui changent de nom."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🏷️","key":"className","val":"À la place de class. class est réservé en JS."},{"icon":"🔗","key":"htmlFor","val":"À la place de for. for est réservé en JS."},{"icon":"{}","key":"Accolades","val":"Insérer du JavaScript dans le JSX."},{"icon":"📦","key":"Fragment <>","val":"Wrapper invisible quand tu as plusieurs éléments."},{"icon":"🔀","key":"&&  et  ? :","val":"Affichage conditionnel dans le JSX."}]},{"id":"r3","num":3,"titre":"Les composants","sous":"Découper l'interface en blocs réutilisables","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Composants — le principe fondamental de React","contenu":{"texte":"Un composant React est une fonction JavaScript qui retourne du JSX. C'est le concept central de React : au lieu d'écrire une grande page HTML monolithique, tu la découpes en blocs indépendants et réutilisables. Chaque composant gère sa propre logique et son propre affichage.","exemple":"Sur Kora, la page d'accueil contient une NavBar, un Feed de posts, chaque post est un composant Post, chaque post contient un BoutonLike... C'est une arborescence de composants. Sur DB Studio, ton formulaire de contact est un composant. La carte de chaque offre est un composant. Tu les écris une fois et tu les réutilises partout.","comparaison":{"sans":{"titre":"Sans composants — tout dans un fichier","code":"<!-- Une page HTML classique -->\n<div class=\"page\">\n  <!-- 200 lignes de code pour le header -->\n  <!-- 500 lignes pour le contenu -->\n  <!-- 150 lignes pour le footer -->\n  <!-- Tout mélangé, difficile à maintenir -->\n</div>","commentaire":"Si tu veux changer le style d'un bouton, tu cherches parmi des centaines de lignes."},"avec":{"titre":"Avec composants React","code":"// Page découpée en composants\nfunction PageAccueil() {\n  return (\n    <>\n      <NavBar />          {/* composant réutilisable */}\n      <Hero titre=\"Kora\" />\n      <Feed>\n        <Post auteur=\"Val\" texte=\"Hello !\" />\n        <Post auteur=\"Marc\" texte=\"Salut !\" />\n        {/* même composant Post, données différentes */}\n      </Feed>\n      <Footer />\n    </>\n  );\n}","commentaire":"Chaque composant est indépendant. Modifier NavBar n'affecte que NavBar."}},"ce_que_fait_react":["Un composant = une fonction avec une Majuscule qui retourne du JSX","Les props = les données reçues du parent (lecture seule)","Un composant peut en contenir d'autres (composition)","Même composant, données différentes = affichages différents","PascalCase obligatoire : NavBar pas navbar, BoutonLike pas boutonlike"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Composants imbriqués — le fil Kora","lignes":[{"code":"// Composant enfant — le plus petit","expl":""},{"code":"function BoutonLike({ count }) {","expl":"Reçoit count (nombre de likes) en prop."},{"code":"  return <button>❤️ {count}</button>;","expl":"Retour sur une ligne possible si c'est simple."},{"code":"}","expl":""},{"code":"","expl":""},{"code":"// Composant intermédiaire","expl":""},{"code":"function Post({ auteur, texte, likes }) {","expl":"Trois props : auteur, texte, likes."},{"code":"  return (","expl":""},{"code":"    <article className=\"post\">","expl":"Un composant peut utiliser des balises HTML ET d'autres composants."},{"code":"      <strong>{auteur}</strong>","expl":""},{"code":"      <p>{texte}</p>","expl":""},{"code":"      <BoutonLike count={likes} />","expl":"Utilise le composant BoutonLike. Lui passe likes en prop."},{"code":"    </article>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""},{"code":"","expl":""},{"code":"// Composant parent — orchestre tout","expl":""},{"code":"function FeedKora() {","expl":""},{"code":"  return (","expl":""},{"code":"    <div className=\"feed\">","expl":""},{"code":"      <Post auteur=\"Val\" texte=\"Première leçon !\" likes={284} />","expl":"Même composant Post, données différentes à chaque fois."},{"code":"      <Post auteur=\"Marc\" texte=\"React c'est top\" likes={47} />","expl":""},{"code":"    </div>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans le bon ordre les parties du composant CarteOffre de DB Studio.","contexte":"Composant qui affiche une offre : titre, prix, et description.","items":["}","  return (","function CarteOffre({ titre, prix, description }) {","    <div className=\"offre\"><h3>{titre}</h3><p>{prix}€</p><p>{description}</p></div>","  );"],"bonne":[2,1,3,4,0],"explication":"Structure composant : function Nom({ props }) { → return ( → JSX → ); → }"},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Tu écris function monBouton() et tu l'utilises avec <monBouton />. Que va-t-il se passer ?","choix":["Ça fonctionne normalement","React va traiter monBouton comme une balise HTML inconnue et ne l'affichera pas correctement","Une erreur de syntaxe JavaScript"],"bonne":1,"explication":"React distingue les composants des balises HTML par la casse. Minuscule = balise HTML (<div>, <p>...). Majuscule = composant React (<MonBouton>). Il faut écrire function MonBouton() et <MonBouton />."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Crée le composant ProfilKora qui reçoit nom, tokens et verifie, et affiche ces informations.","contexte":"Profil utilisateur sur Kora — nom, badge vérifié si applicable, tokens.","labels":["props reçues","badge conditionnel"],"bonnes":["{ nom, tokens, verifie }","verifie && <span>Vérifié</span>"],"template":"function ProfilKora([A]) {\n  return (\n    <div className=\"profil\">\n      <h2>{nom} {[B]}</h2>\n      <p>{tokens} KRT</p>\n    </div>\n  );\n}","aide":"Les props se destructurent entre accolades. Le && affiche le span seulement si verifie est true."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🧱","key":"Composant","val":"function Nom({ props }) { return JSX; }"},{"icon":"🔤","key":"PascalCase","val":"Majuscule obligatoire. MonComposant pas monComposant."},{"icon":"📫","key":"Props","val":"Données reçues du parent. Lecture seule — jamais modifier."},{"icon":"♻️","key":"Réutilisable","val":"Même composant, props différentes = affichages différents."}]},{"id":"r4","num":4,"titre":"useState","sous":"Mémoriser et faire changer les données","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"L'état — rendre les composants interactifs","contenu":{"texte":"Un composant React est statique par défaut — il affiche ce qu'on lui donne et c'est tout. Pour qu'il réagisse aux clics, aux saisies, aux changements, il a besoin d'un état. L'état (state en anglais) est une valeur mémorisée par le composant qui, quand elle change, provoque une mise à jour automatique de l'affichage.","exemple":"Le bouton Like sur Kora : au clic, le compteur augmente et le cœur devient rouge. Ces deux informations (le chiffre et la couleur) sont des états. Le formulaire de contact de DB Studio : le texte que tu tapes dans les champs, c'est un état. Chaque fois que tu tapes une lettre, l'état change et l'input se met à jour.","comparaison":{"sans":{"titre":"Sans état — composant statique","code":"// Ce composant ne peut jamais changer\nfunction Badge({ count }) {\n  return <span>{count}</span>;\n  // count vient du parent\n  // Si le parent ne change pas, count ne change jamais\n}","commentaire":"Utile pour afficher des données fixes. Pas utile pour les interactions."},"avec":{"titre":"Avec useState — composant interactif","code":"import { useState } from 'react';\n\nfunction Compteur() {\n  //   valeur    fonction       départ\n  const [count, setCount] = useState(0);\n  //                                 ↑\n  //              valeur de départ = 0\n\n  // Au clic : setCount(count + 1)\n  // → count change → React re-rend → nouveau chiffre affiché\n  return (\n    <button onClick={() => setCount(count + 1)}>\n      {count} clics\n    </button>\n  );\n}","commentaire":"useState(0) démarre à 0. setCount() change la valeur → affichage mis à jour."}},"ce_que_fait_react":["Rappel : const x = 0 → x ne peut pas être réassigné directement. C'est pour ça qu'on ne peut pas faire x = x + 1","useState(valeurInitiale) retourne [valeurActuelle, fonctionDeChangement]","Appeler setValeur() → React re-rend le composant avec la nouvelle valeur","setValeur() est l'UNIQUE façon de changer la valeur et de mettre la page à jour","La valeur peut être : number, string, boolean, tableau, objet"]}},{"id":"observe","label":"Observer","type":"observe","titre":"useState — bouton like Kora complet","lignes":[{"code":"import { useState } from 'react';","expl":"Toujours importer useState depuis 'react' avant de l'utiliser."},{"code":"","expl":""},{"code":"function BoutonLike({ likesInitiaux }) {","expl":"Reçoit le nombre de likes de départ en prop."},{"code":"  // État 1 : le nombre de likes","expl":""},{"code":"  const [likes, setLikes] = useState(likesInitiaux);","expl":"likes = valeur actuelle. setLikes = comment changer. useState(likesInitiaux) = commence avec la valeur reçue."},{"code":"","expl":""},{"code":"  // État 2 : est-ce que l'utilisateur a liké ?","expl":""},{"code":"  const [aLike, setALike] = useState(false);","expl":"aLike = true si liké, false sinon. Commence à false."},{"code":"","expl":""},{"code":"  const handleClick = () => {","expl":"La fonction qui s'exécute au clic. On la définit avant le return."},{"code":"    if (aLike) {","expl":"Si déjà liké..."},{"code":"      setLikes(likes - 1);","expl":"On retire un like."},{"code":"      setALike(false);","expl":"On repasse à non-liké."},{"code":"    } else {","expl":"Sinon..."},{"code":"      setLikes(likes + 1);","expl":"On ajoute un like."},{"code":"      setALike(true);","expl":"On marque comme liké."},{"code":"    }","expl":""},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  return (","expl":""},{"code":"    <button","expl":""},{"code":"      onClick={handleClick}","expl":"onClick reçoit la référence de la fonction — pas handleClick() mais handleClick."},{"code":"      style={{ color: aLike ? 'red' : 'gray' }}","expl":"Couleur dynamique selon l'état aLike."},{"code":"    >","expl":""},{"code":"      ❤️ {likes}","expl":"Le nombre de likes se met à jour automatiquement."},{"code":"    </button>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre pour créer un état 'tokens' qui démarre à 0.","contexte":"Déclaration d'un état React avec useState.","items":["useState(0);","const","= ","[tokens, setTokens]"],"bonne":[1,3,2,0],"explication":"const [valeur, setValeur] = useState(valeurInitiale); — la déstructuration [a, b] extrait les deux valeurs retournées par useState."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Dans un composant React, tu fais : let count = 0; puis count = count + 1; au clic. Que se passe-t-il ?","choix":["La variable change mais l'affichage ne se met pas à jour — React ne voit pas ce changement","L'affichage se met à jour normalement","Une erreur : les variables ne peuvent pas changer en React"],"bonne":0,"explication":"React ne surveille que les états créés avec useState. Changer une variable normale ne déclenche pas de mise à jour de l'affichage. C'est pour ça qu'il faut utiliser const [count, setCount] = useState(0) et appeler setCount() pour changer la valeur."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Complète le composant : un bouton qui ajoute 10 tokens à chaque clic, avec l'état initialisé à 0.","contexte":"Mini-jeu sur Kora : gagner des tokens en cliquant.","labels":["déclaration état","mise à jour état"],"bonnes":["const [tokens, setTokens] = useState(0)","setTokens(tokens + 10)"],"template":"function GagnerTokens() {\n  [A];\n\n  return (\n    <div>\n      <p>Tu as {tokens} KRT</p>\n      <button onClick={() => [B]}>\n        + 10 tokens\n      </button>\n    </div>\n  );\n}","aide":"useState(0) initialise à 0. setTokens(tokens + 10) ajoute 10 à la valeur actuelle. onClick reçoit une arrow function () => ..."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"💾","key":"useState(init)","val":"[valeur, setValeur]. init = valeur de départ."},{"icon":"🔄","key":"setValeur()","val":"Changer la valeur → React met l'affichage à jour."},{"icon":"⚠️","key":"Jamais direct","val":"val = x ne fonctionne pas. Toujours setVal(x)."},{"icon":"🎯","key":"onClick={fn}","val":"Passe la référence. onClick={fn} pas onClick={fn()}."}]},{"id":"r5","num":5,"titre":"Les événements","sous":"Réagir aux clics et aux saisies","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Les événements — interaction utilisateur","contenu":{"texte":"Les événements permettent à ton composant de réagir aux actions de l'utilisateur : clics sur les boutons, saisie dans les champs, soumission de formulaires. En React, les événements s'écrivent en camelCase (onClick, onChange, onSubmit) et reçoivent toujours une fonction JavaScript.","exemple":"La barre de recherche sur Kora qui filtre les posts à chaque frappe — c'est l'événement onChange sur l'input. Le bouton Publier qui envoie un post — c'est onClick. Le formulaire de contact de DB Studio — c'est onSubmit avec e.preventDefault() pour empêcher le rechargement de page.","comparaison":{"sans":{"titre":"HTML — événements en attributs string","code":"<!-- HTML classique -->\n<button onclick=\"handleClick()\">Cliquer</button>\n<!-- on passe une STRING contenant le nom de la fonction -->","commentaire":"En HTML, les handlers d'événements sont des chaînes de texte."},"avec":{"titre":"React — événements en JSX","code":"// React — on passe une FONCTION JS\n<button onClick={handleClick}>Cliquer</button>\n//                ↑ référence à la fonction (pas de ())\n\n// Pour passer un argument :\n<button onClick={() => supprimer(post.id)}>X</button>\n//             ↑ arrow function qui appelle avec l'argument\n\n// Formulaire — toujours preventDefault :\n<form onSubmit={(e) => {\n  e.preventDefault(); // empêche rechargement\n  envoyerDonnées();\n}}>","commentaire":"onClick={handleClick} passe la référence. onClick={handleClick()} appelle immédiatement."}},"ce_que_fait_react":["onClick, onChange, onSubmit, onKeyDown... camelCase toujours","onClick={fn} — passe la référence, pas l'appel","onClick={() => fn(arg)} — arrow function pour passer des arguments","e.preventDefault() dans onSubmit — empêche le rechargement de page","e.target.value — récupère la valeur d'un input dans onChange"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Formulaire de contact DB Studio en React","lignes":[{"code":"function FormulaireContact() {","expl":""},{"code":"  const [nom, setNom] = useState('');","expl":"État pour le champ nom. Commence vide."},{"code":"  const [email, setEmail] = useState('');","expl":"État pour le champ email."},{"code":"  const [envoye, setEnvoye] = useState(false);","expl":"État pour savoir si le formulaire est envoyé."},{"code":"","expl":""},{"code":"  const handleSubmit = (e) => {","expl":"La fonction qui gère la soumission. Reçoit l'événement e."},{"code":"    e.preventDefault();","expl":"OBLIGATOIRE dans onSubmit. Empêche le rechargement de la page."},{"code":"    if (!nom || !email) return;","expl":"Validation : si un champ est vide, on arrête."},{"code":"    // Ici : envoyer les données au serveur","expl":""},{"code":"    setEnvoye(true);","expl":"On change l'état — React va re-rendre avec envoye = true."},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  if (envoye) {","expl":"Si le formulaire est envoyé, afficher un message de confirmation."},{"code":"    return <p>Message envoyé ! Merci {nom}.</p>;","expl":"Return anticipé — on sort du composant avant le formulaire."},{"code":"  }","expl":""},{"code":"","expl":""},{"code":"  return (","expl":"Si pas encore envoyé, afficher le formulaire."},{"code":"    <form onSubmit={handleSubmit}>","expl":"onSubmit reçoit la référence de handleSubmit — sans ()."},{"code":"      <input","expl":""},{"code":"        value={nom}","expl":"value lié à l'état nom. C'est un input contrôlé par React."},{"code":"        onChange={(e) => setNom(e.target.value)}","expl":"À chaque frappe : e.target.value = ce que l'utilisateur tape → setNom() met à jour l'état."},{"code":"        placeholder=\"Votre nom\"","expl":""},{"code":"      />","expl":"Auto-fermant en JSX."},{"code":"      <button type=\"submit\">Envoyer</button>","expl":""},{"code":"    </form>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre les parties de cet événement onChange qui met à jour la recherche.","contexte":"Barre de recherche Kora — chaque frappe met à jour l'état.","items":["e.target.value","onChange={(","e) => setRecherche(",")}"],"bonne":[1,2,0,3],"explication":"onChange reçoit une arrow function. (e) = l'événement. e.target.value = ce que l'utilisateur a tapé. setRecherche() met à jour l'état."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Tu écris <button onClick={supprimer()}>X</button>. Que va-t-il se passer ?","choix":["La fonction supprimer s'exécute quand on clique","La fonction supprimer s'exécute immédiatement au chargement, pas au clic","Une erreur de syntaxe"],"bonne":1,"explication":"supprimer() avec les parenthèses = appel immédiat de la fonction. React exécute supprimer() pendant le rendu du composant. Pour qu'elle s'exécute au clic, il faut passer la référence : onClick={supprimer} ou une arrow function : onClick={() => supprimer()}."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Complète l'input de recherche Kora. À chaque frappe, la valeur doit être affichée en dessous.","contexte":"Barre de recherche avec affichage en temps réel.","labels":["valeur liée état","handler onChange"],"bonnes":["value={recherche}","(e) => setRecherche(e.target.value)"],"template":"function SearchKora() {\n  const [recherche, setRecherche] = useState('');\n\n  return (\n    <div>\n      <input\n        [A]\n        onChange={[B]}\n        placeholder=\"Rechercher sur Kora...\"\n      />\n      <p>Tu cherches : {recherche}</p>\n    </div>\n  );\n}","aide":"value={recherche} synchronise l'input avec l'état. onChange reçoit e, et e.target.value contient ce que l'utilisateur a tapé."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"👆","key":"onClick={fn}","val":"Référence — pas d'appel. onClick={fn} pas onClick={fn()}."},{"icon":"✏️","key":"onChange","val":"e.target.value = valeur actuelle de l'input."},{"icon":"📨","key":"onSubmit","val":"Toujours e.preventDefault() en premier."},{"icon":"🎯","key":"Arrow function","val":"() => fn(arg) pour passer des arguments au clic."}]},{"id":"r6","num":6,"titre":"Les listes","sous":"Afficher des tableaux de données","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Afficher des listes avec .map()","contenu":{"texte":"Une application React travaille presque toujours avec des tableaux de données : liste de posts, de formations, d'utilisateurs. Pour afficher chaque élément, React utilise la méthode JavaScript .map() qui transforme un tableau de données en tableau d'éléments JSX.","exemple":"Le fil Kora avec ses dizaines de posts, le catalogue Kora Academy avec ses formations, la liste des offres DB Studio — ce sont tous des tableaux affichés avec .map(). La prop key est obligatoire et doit être unique pour que React optimise les mises à jour.","comparaison":{"sans":{"titre":"Sans .map() — répétition manuelle","code":"// Écrire chaque élément à la main\n<div className=\"feed\">\n  <Post auteur=\"Val\" texte=\"Post 1\" />\n  <Post auteur=\"Marc\" texte=\"Post 2\" />\n  <Post auteur=\"Léa\" texte=\"Post 3\" />\n  {/* Impossible si les données viennent d'une API */}\n</div>","commentaire":"Fonctionne pour des données fixes. Impossible avec des données dynamiques."},"avec":{"titre":"Avec .map() — dynamique","code":"// Tableau de données\nconst posts = [\n  { id: 1, auteur: 'Val', texte: 'Post 1' },\n  { id: 2, auteur: 'Marc', texte: 'Post 2' },\n  { id: 3, auteur: 'Léa', texte: 'Post 3' },\n];\n\n// .map() transforme chaque objet en composant JSX\n<div className=\"feed\">\n  {posts.map(post => (\n    <Post\n      key={post.id}        // OBLIGATOIRE\n      auteur={post.auteur}\n      texte={post.texte}\n    />\n  ))}\n</div>","commentaire":"Fonctionne avec n'importe quel nombre d'éléments. key est obligatoire."}},"ce_que_fait_react":[".map() transforme chaque élément du tableau en JSX","key={id} obligatoire — utilise un identifiant unique et stable","Ne pas utiliser l'index du tableau comme key si la liste peut changer","Gérer le cas liste vide avec {tableau.length === 0 && <p>Vide</p>}","{...objet} spread pour passer toutes les propriétés en props d'un coup"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Liste de formations Kora avec filtre","lignes":[{"code":"function ListeFormations({ formations }) {","expl":"Reçoit le tableau de formations en prop."},{"code":"  const [filtre, setFiltre] = useState('tous');","expl":"État pour le filtre actif."},{"code":"","expl":""},{"code":"  // Calcul des formations filtrées","expl":""},{"code":"  const filtrees = filtre === 'tous'","expl":""},{"code":"    ? formations","expl":"Si filtre = 'tous', garder toutes les formations."},{"code":"    : formations.filter(f => f.categorie === filtre);","expl":"Sinon, garder seulement celles de la bonne catégorie."},{"code":"","expl":""},{"code":"  return (","expl":""},{"code":"    <div>","expl":""},{"code":"      {/* Boutons filtres */}","expl":""},{"code":"      {['tous', 'react', 'css', 'js'].map(cat => (","expl":"On map aussi les catégories pour créer les boutons."},{"code":"        <button","expl":""},{"code":"          key={cat}","expl":"key obligatoire même pour des éléments simples dans .map()."},{"code":"          className={filtre === cat ? 'actif' : ''}","expl":"Classe dynamique : 'actif' si c'est le filtre sélectionné."},{"code":"          onClick={() => setFiltre(cat)}","expl":"Au clic, changer le filtre actif."},{"code":"        >","expl":""},{"code":"          {cat}","expl":""},{"code":"        </button>","expl":""},{"code":"      ))}","expl":"Double parenthèse : une pour le .map(), une pour le JSX."},{"code":"","expl":""},{"code":"      {/* Cas liste vide */}","expl":""},{"code":"      {filtrees.length === 0 && <p>Aucune formation trouvée</p>}","expl":"Si la liste est vide, afficher un message."},{"code":"","expl":""},{"code":"      {/* Affichage des formations */}","expl":""},{"code":"      {filtrees.map(f => (","expl":"On map les formations filtrées."},{"code":"        <CarteFormation","expl":""},{"code":"          key={f.id}","expl":"key = identifiant unique stable. Pas l'index du tableau."},{"code":"          titre={f.titre}","expl":""},{"code":"          lecons={f.lecons}","expl":""},{"code":"        />","expl":""},{"code":"      ))}","expl":""},{"code":"    </div>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre pour afficher correctement une liste de posts avec .map().","contexte":"Fil de posts Kora avec la prop key obligatoire.","items":["      <Post key={post.id} auteur={post.auteur} />","    <div className=\"feed\">","  return (","    </div>","      {posts.map(post => (","      ))}","  );"],"bonne":[2,1,4,0,5,3,6],"explication":"return ( → <div> → {posts.map(post => ( → <Post key={} ... /> → ))} → </div> → );"},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Tu utilises l'index du tableau comme key : key={index}. Tu réorganises la liste. Que risque-t-il de se passer ?","choix":["Rien, key={index} est toujours valide","React peut mixer les états des composants car les keys ont changé avec la réorganisation","Une erreur JavaScript s'affiche dans la console"],"bonne":1,"explication":"Si tu déplaces l'élément d'index 0 en position 3, sa key change de 0 à 3. React pense que c'est un autre composant. Les états internes peuvent être perdus ou mélangés. Utiliser un ID stable (post.id, formation.id) garantit que React reconnaît chaque élément même si l'ordre change."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Affiche la liste des offres DB Studio avec .map(). Gère le cas où la liste est vide.","contexte":"Liste d'offres commerciales — chaque offre a un id, un nom et un prix.","labels":["méthode pour transformer le tableau","message si liste vide"],"bonnes":["offres.map(o => <CarteOffre key={o.id} nom={o.nom} prix={o.prix} />)","offres.length === 0 && <p>Aucune offre disponible</p>"],"template":"function ListeOffres({ offres }) {\n  return (\n    <div className=\"offres\">\n      {[A]}\n      {[B]}\n    </div>\n  );\n}","aide":".map() parcourt le tableau. key obligatoire. Pour le cas vide : longueur === 0 && message."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🔄","key":".map()","val":"Transforme un tableau en liste de JSX."},{"icon":"🔑","key":"key={id}","val":"Obligatoire. ID stable — pas l'index si liste peut changer."},{"icon":"📭","key":"length === 0","val":"Toujours gérer le cas liste vide."},{"icon":"📤","key":"{...objet}","val":"Spread : passe toutes les propriétés en props."}]},{"id":"r7","num":7,"titre":"useEffect","sous":"Charger des données et réagir aux changements","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"useEffect — les effets de bord","contenu":{"texte":"useEffect permet d'exécuter du code APRÈS que le composant s'est affiché. C'est là où tu places tout ce qui interagit avec l'extérieur : charger des données depuis une API, modifier le titre de la page, s'abonner à des événements. Sans useEffect, ces actions s'exécuteraient pendant le rendu, causant des problèmes.","exemple":"Quand tu arrives sur le catalogue Kora, la page doit charger les formations depuis le serveur. Ce chargement doit se déclencher une seule fois, après que la page s'affiche. useEffect avec un tableau de dépendances vide [] fait exactement ça.","comparaison":{"sans":{"titre":"Sans useEffect — exécution pendant le rendu","code":"// MAUVAIS — s'exécute à chaque rendu\nfunction Catalogue() {\n  fetch('/api/formations') // s'exécute en boucle !\n    .then(r => r.json())\n    .then(setFormations);\n  return <div>...</div>;\n}","commentaire":"Sans useEffect, le fetch s'exécute à chaque re-render. Boucle infinie."},"avec":{"titre":"Avec useEffect","code":"function Catalogue() {\n  const [formations, setFormations] = useState([]);\n\n  useEffect(() => {\n    // S'exécute UNE FOIS après le premier affichage\n    fetch('/api/formations')\n      .then(r => r.json())\n      .then(data => setFormations(data));\n  }, []); // [] = dépendances vides = une seule fois\n\n  return <div>{formations.map(...)}</div>;\n}","commentaire":"useEffect avec [] = s'exécute une fois au montage. Propre et prévisible."}},"ce_que_fait_react":["useEffect(fonction, []) — s'exécute une fois après le premier affichage","useEffect(fonction, [dep]) — se relance chaque fois que dep change","useEffect(fonction) — sans tableau : s'exécute après chaque render (à éviter)","La fonction ne peut pas être async directement — définir async à l'intérieur","try/catch/finally pour gérer les erreurs et désactiver le spinner"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Pattern complet — chargement données API","lignes":[{"code":"function CatalogueKora() {","expl":""},{"code":"  const [formations, setFormations] = useState([]);","expl":"Données — tableau vide au départ."},{"code":"  const [loading, setLoading] = useState(true);","expl":"true dès le départ — le spinner s'affiche immédiatement."},{"code":"  const [erreur, setErreur] = useState(null);","expl":"null = pas d'erreur au départ."},{"code":"","expl":""},{"code":"  useEffect(() => {","expl":"S'exécute après le premier rendu."},{"code":"    async function charger() {","expl":"Fonction async définie à l'intérieur. useEffect ne peut pas être async directement."},{"code":"      try {","expl":""},{"code":"        const res = await fetch('/api/formations');","expl":"On fait la requête."},{"code":"        if (!res.ok) throw new Error('Erreur ' + res.status);","expl":"Si le serveur répond 404 ou 500, on lève une erreur."},{"code":"        const data = await res.json();","expl":"On parse la réponse JSON."},{"code":"        setFormations(data);","expl":"On stocke les données → React met la page à jour."},{"code":"      } catch(e) {","expl":""},{"code":"        setErreur(e.message);","expl":"On stocke le message d'erreur."},{"code":"      } finally {","expl":"finally s'exécute toujours, succès ou échec."},{"code":"        setLoading(false);","expl":"On masque le spinner dans tous les cas."},{"code":"      }","expl":""},{"code":"    }","expl":""},{"code":"    charger();","expl":"On appelle la fonction async définie au-dessus."},{"code":"  }, []);","expl":"[] = dépendances vides = exécuter une seule fois au montage."},{"code":"","expl":""},{"code":"  if (loading) return <p>Chargement...</p>;","expl":"Return anticipé : pendant le chargement, afficher un message."},{"code":"  if (erreur) return <p>Erreur : {erreur}</p>;","expl":"Return anticipé : si erreur, afficher le message."},{"code":"","expl":""},{"code":"  return (","expl":"Si on arrive ici : chargement terminé, pas d'erreur, données disponibles."},{"code":"    <div>{formations.map(f => <Carte key={f.id} {...f} />)}</div>","expl":"On affiche les formations."},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre les 3 états nécessaires pour un chargement de données.","contexte":"Pattern standard : données + loading + erreur.","items":["const [erreur, setErreur] = useState(null);","const [posts, setPosts] = useState([]);","const [loading, setLoading] = useState(true);"],"bonne":[1,2,0],"explication":"Ordre logique : d'abord les données [], ensuite le loading (true = spinner visible dès le départ), ensuite l'erreur (null = pas d'erreur)."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Tu écris useEffect sans le tableau de dépendances : useEffect(() => { fetch(...).then(setPosts); }). Que se passe-t-il ?","choix":["Le fetch se déclenche une seule fois au chargement","Le fetch se déclenche en boucle infinie — setPosts cause un re-render qui relance useEffect","Le fetch ne se déclenche jamais"],"bonne":1,"explication":"Sans [], useEffect se relance après chaque re-render. setPosts() déclenche un re-render. Ce re-render déclenche useEffect. Boucle infinie. La solution : ajouter [] pour n'exécuter qu'une seule fois au montage."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Complète le useEffect qui charge les posts au montage, avec les 3 états corrects.","contexte":"Feed Kora — chargement au montage, gestion loading et erreur.","labels":["fonction async interne","tableau dépendances"],"bonnes":["async function charger()","[]"],"template":"function Feed() {\n  const [posts, setPosts] = useState([]);\n  const [loading, setLoading] = useState(true);\n  const [erreur, setErreur] = useState(null);\n\n  useEffect(() => {\n    [A] {\n      try {\n        const data = await fetch('/api/posts').then(r => r.json());\n        setPosts(data);\n      } catch(e) {\n        setErreur(e.message);\n      } finally {\n        setLoading(false);\n      }\n    }\n    charger();\n  }, [B]);\n\n  if (loading) return <p>Chargement...</p>;\n  if (erreur) return <p>{erreur}</p>;\n  return posts.map(p => <Post key={p.id} {...p} />);\n}","aide":"La fonction async se définit à l'intérieur du useEffect. [] en dépendances = exécuter une seule fois au montage."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🚀","key":"useEffect(fn, [])","val":"S'exécute une fois après le premier affichage."},{"icon":"🔄","key":"useEffect(fn, [dep])","val":"Se relance quand dep change."},{"icon":"⚠️","key":"Sans []","val":"Boucle infinie si l'effet modifie le state."},{"icon":"🛡️","key":"try/catch/finally","val":"finally désactive le loading dans tous les cas."}]},{"id":"r8","num":8,"titre":"Props et communication","sous":"Faire communiquer les composants","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Props — le flux de données entre composants","contenu":{"texte":"Dans React, les données circulent dans un seul sens : du parent vers l'enfant, via les props. Pour qu'un enfant communique avec son parent (signaler un clic, envoyer une valeur), le parent lui passe une fonction en prop — l'enfant l'appelle quand nécessaire.","exemple":"Sur Kora, le composant Feed possède la liste des posts. Chaque Post enfant a un bouton Like. Quand on clique Like dans un Post, il ne peut pas modifier directement les données du Feed. Il appelle la fonction onLike que Feed lui a passée. Feed met alors à jour ses propres données.","comparaison":{"sans":{"titre":"Mauvais — l'enfant modifie directement","code":"// INTERDIT en React\nfunction Post({ posts, index }) {\n  return (\n    <button onClick={() => {\n      posts[index].likes++; // NE PAS FAIRE\n      // React ne voit pas ce changement\n    }}>\n      Like\n    </button>\n  );\n}","commentaire":"Muter les props directement ne déclenche pas de re-render et cause des bugs."},"avec":{"titre":"Correct — callback du parent","code":"// Parent — possède les données\nfunction Feed() {\n  const [posts, setPosts] = useState(data);\n\n  const handleLike = (id) => {\n    setPosts(prev => prev.map(p =>\n      p.id === id ? { ...p, likes: p.likes + 1 } : p\n    ));\n  };\n\n  return posts.map(p =>\n    <Post key={p.id} post={p} onLike={handleLike} />\n  );\n}\n\n// Enfant — appelle la callback\nfunction Post({ post, onLike }) {\n  return (\n    <button onClick={() => onLike(post.id)}>\n      {post.likes} Likes\n    </button>\n  );\n}","commentaire":"Le parent gère les données. L'enfant signale via la callback."}},"ce_que_fait_react":["Les données descendent : parent → enfant via props","Les actions remontent : enfant → parent via callback (fonction en prop)","L'enfant ne doit jamais modifier les props reçues","props.children = contenu placé entre les balises du composant","Lifting state up : si deux enfants partagent des données, les remonter au parent commun"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Système complet parent-enfant — Kora","lignes":[{"code":"// ── PARENT : Feed ──────────────────────","expl":""},{"code":"function Feed() {","expl":""},{"code":"  const [posts, setPosts] = useState([","expl":"Le Feed possède l'état des posts."},{"code":"    { id: 1, texte: 'Hello', likes: 10 },","expl":""},{"code":"    { id: 2, texte: 'React !', likes: 5 },","expl":""},{"code":"  ]);","expl":""},{"code":"","expl":""},{"code":"  const handleLike = (id) => {","expl":"Cette fonction sera passée aux Post enfants."},{"code":"    setPosts(prev => prev.map(p =>","expl":""},{"code":"      p.id === id ? { ...p, likes: p.likes + 1 } : p","expl":"Si c'est le bon post, augmenter les likes. {...p} copie l'objet, on ne mute pas."},{"code":"    ));","expl":""},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  return posts.map(p => (","expl":""},{"code":"    <Post","expl":""},{"code":"      key={p.id}","expl":""},{"code":"      post={p}","expl":"On passe tout l'objet post."},{"code":"      onLike={handleLike}","expl":"On passe la fonction — l'enfant pourra l'appeler."},{"code":"    />","expl":""},{"code":"  ));","expl":""},{"code":"}","expl":""},{"code":"","expl":""},{"code":"// ── ENFANT : Post ──────────────────────","expl":""},{"code":"function Post({ post, onLike }) {","expl":"Reçoit l'objet post ET la fonction onLike."},{"code":"  return (","expl":""},{"code":"    <article>","expl":""},{"code":"      <p>{post.texte}</p>","expl":""},{"code":"      <button onClick={() => onLike(post.id)}>","expl":"Au clic, appelle la fonction du parent avec l'id du post."},{"code":"        {post.likes} ❤️","expl":""},{"code":"      </button>","expl":""},{"code":"    </article>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre les éléments pour que l'enfant appelle correctement la callback du parent.","contexte":"Bouton supprimer un post — l'enfant signale au parent.","items":["onSupprimer(post.id)","<button","onClick={() => ","}>Supprimer</button>"],"bonne":[1,2,0,3],"explication":"<button onClick={() => onSupprimer(post.id)}>. L'arrow function () => permet de passer l'argument post.id à la callback."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Un composant enfant reçoit la prop `couleur`. Il veut la modifier. Que doit-il faire ?","choix":["couleur = 'rouge' — modifier la prop directement","Appeler une fonction callback que le parent lui a passée pour signaler le changement","Utiliser useState(couleur) et modifier l'état local"],"bonne":1,"explication":"Les props sont en lecture seule — jamais modifier une prop directement. Si l'enfant doit provoquer un changement, il appelle une callback passée par le parent. Le parent, lui, possède l'état et peut le modifier avec son setter."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Complete le composant Card qui accepte du contenu variable via children, et le composant parent qui l'utilise.","contexte":"Composant Card réutilisable sur Kora — peut contenir n'importe quoi.","labels":["prop children","utilisation avec contenu"],"bonnes":["{ children }","<Card><h2>Titre</h2><p>Texte</p></Card>"],"template":"// Composant Card réutilisable\nfunction Card([A]) {\n  return (\n    <div className=\"card\">\n      {children}\n    </div>\n  );\n}\n\n// Utilisation dans une page Kora\nfunction PageKora() {\n  return (\n    [B]\n  );\n}","aide":"children est une prop spéciale — elle contient ce qui est placé entre les balises du composant."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"⬇️","key":"Parent → Enfant","val":"Via props. Données descendent."},{"icon":"⬆️","key":"Enfant → Parent","val":"Via callback passée en prop."},{"icon":"🚫","key":"Props = lecture seule","val":"Jamais modifier une prop directement."},{"icon":"👶","key":"children","val":"Contenu placé entre les balises du composant."}]},{"id":"r9","num":9,"titre":"Formulaires contrôlés","sous":"Gérer les inputs avec React","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Formulaires — React comme source de vérité","contenu":{"texte":"Un formulaire contrôlé signifie que React gère la valeur de chaque input via le state. À chaque frappe, l'état est mis à jour et la valeur de l'input reflète toujours le state. Avantage : tu peux valider, transformer et accéder aux valeurs à tout moment, pas seulement à la soumission.","exemple":"Le formulaire d'inscription Kora : validation du pseudo en temps réel (pas de caractères spéciaux), vérification que l'email contient un @, message d'erreur immédiat. Le formulaire de contact DB Studio : validation avant envoi, reset après soumission.","comparaison":{"sans":{"titre":"Non contrôlé — HTML standard","code":"<!-- HTML — le navigateur gère la valeur -->\n<form onsubmit=\"handleSubmit(event)\">\n  <input type=\"text\" name=\"nom\" />\n  <!-- On lit la valeur seulement à la soumission -->\n  <!-- Validation en temps réel difficile -->\n</form>","commentaire":"Fonctionne mais limité. Validation en temps réel compliquée."},"avec":{"titre":"Contrôlé — React gère","code":"const [nom, setNom] = useState('');\nconst estValide = nom.length >= 3; // calculé en temps réel\n\n<input\n  value={nom}          // React impose la valeur\n  onChange={(e) => setNom(e.target.value)}\n  className={estValide ? 'valide' : 'erreur'}\n/>\n{!estValide && <p>Minimum 3 caractères</p>}","commentaire":"React contrôle. Validation instantanée possible."}},"ce_que_fait_react":["value={state} — React impose la valeur affichée dans l'input","onChange → setValeur — met à jour l'état à chaque frappe","value sans onChange = input bloqué (React empêche les modifications)","Un seul handler générique pour plusieurs champs avec e.target.name","e.preventDefault() dans onSubmit — empêche le rechargement de page"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Formulaire d'inscription Kora — handler générique","lignes":[{"code":"function FormulaireInscription() {","expl":""},{"code":"  // Un seul état objet pour tous les champs","expl":""},{"code":"  const [form, setForm] = useState({","expl":"Plus pratique que plusieurs useState séparés pour les formulaires."},{"code":"    pseudo: '',","expl":""},{"code":"    email: '',","expl":""},{"code":"    motdepasse: ''","expl":""},{"code":"  });","expl":""},{"code":"  const [erreur, setErreur] = useState('');","expl":"Pour les messages d'erreur."},{"code":"","expl":""},{"code":"  // Handler générique pour tous les inputs","expl":""},{"code":"  const handleChange = (e) => {","expl":"Un seul handler pour tous les champs."},{"code":"    setForm(prev => ({","expl":"prev = état précédent."},{"code":"      ...prev,","expl":"Spread : conserver tous les autres champs."},{"code":"      [e.target.name]: e.target.value","expl":"Computed property : [nom_du_champ] = nouvelle_valeur. Si l'input s'appelle 'pseudo', ça met à jour form.pseudo."},{"code":"    }));","expl":""},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  const handleSubmit = (e) => {","expl":""},{"code":"    e.preventDefault();","expl":"Empêche le rechargement de page."},{"code":"    if (form.pseudo.length < 3) {","expl":"Validation."},{"code":"      setErreur('Pseudo trop court (3 caractères min)');","expl":""},{"code":"      return;","expl":"Arrêter l'exécution si invalide."},{"code":"    }","expl":""},{"code":"    // Envoyer les données au serveur","expl":""},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  return (","expl":""},{"code":"    <form onSubmit={handleSubmit}>","expl":""},{"code":"      <input name=\"pseudo\" value={form.pseudo} onChange={handleChange} />","expl":"name=\"pseudo\" correspond à la clé dans l'objet form."},{"code":"      <input name=\"email\" value={form.email} onChange={handleChange} />","expl":"Même handler pour tous les inputs."},{"code":"      {erreur && <p className=\"erreur\">{erreur}</p>}","expl":"Affiche l'erreur si elle existe."},{"code":"      <button type=\"submit\">Créer mon compte</button>","expl":""},{"code":"    </form>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Remets dans l'ordre les parties du handler générique pour un formulaire multi-champs.","contexte":"Handler onChange qui met à jour le bon champ selon son name.","items":["[e.target.name]: e.target.value","const handleChange = (e) => {","  setForm(prev => ({ ...prev,","  }));","};"],"bonne":[1,2,0,3,4],"explication":"handleChange reçoit l'événement e. setForm avec prev pour conserver les autres champs. [e.target.name] = computed property qui cible le bon champ selon le name de l'input."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette","question":"Tu écris <input value={email} placeholder=\"Email\" /> sans onChange. Que se passe-t-il quand l'utilisateur tape ?","choix":["L'input accepte la saisie normalement","React bloque la saisie — l'input reste vide car React impose value={email} sans permettre de le changer","L'input affiche une erreur dans la console"],"bonne":1,"explication":"value={state} sans onChange crée un input en lecture seule. React impose la valeur du state et empêche toute modification. Pour qu'il accepte la saisie, il faut obligatoirement ajouter onChange qui met à jour le state."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration","instruction":"Complète le formulaire de contact DB Studio avec le handler générique.","contexte":"3 champs : nom, email, message. Un seul handleChange.","labels":["spread état précédent","computed property"],"bonnes":["...prev","[e.target.name]: e.target.value"],"template":"function FormulaireContact() {\n  const [form, setForm] = useState({ nom: '', email: '', message: '' });\n\n  const handleChange = (e) => {\n    setForm(prev => ({\n      [A],\n      [B]\n    }));\n  };\n\n  return (\n    <form onSubmit={(e) => e.preventDefault()}>\n      <input name=\"nom\" value={form.nom} onChange={handleChange} />\n      <input name=\"email\" value={form.email} onChange={handleChange} />\n      <textarea name=\"message\" value={form.message} onChange={handleChange} />\n      <button type=\"submit\">Envoyer</button>\n    </form>\n  );\n}","aide":"...prev copie tous les champs existants. [e.target.name] est une computed property — si l'input s'appelle 'email', ça met à jour form.email."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🎛️","key":"Contrôlé","val":"value={state} + onChange = React gère tout."},{"icon":"✏️","key":"onChange","val":"e.target.value = valeur actuelle de l'input."},{"icon":"📋","key":"e.target.name","val":"Un seul handler pour N champs."},{"icon":"⚠️","key":"value sans onChange","val":"Input bloqué en lecture seule."}]},{"id":"r10","num":10,"titre":"Tout assembler","sous":"Une vraie app React de A à Z","steps":[{"id":"intro","label":"Intro","type":"intro","titre":"Assembler toutes les pièces — app Kora complète","contenu":{"texte":"Tu as appris les briques fondamentales de React : JSX, composants, props, useState, événements, listes, useEffect, formulaires. Dans une vraie application, tout s'assemble. Voici comment les leçons précédentes s'articulent pour créer une fonctionnalité complète : le fil de posts Kora avec chargement, création et like.","exemple":"La page principale de Kora : au chargement, useEffect charge les posts existants. L'utilisateur peut rédiger un nouveau post (formulaire contrôlé). Au clic Publier, le post s'ajoute à la liste. Chaque post peut être liké (callback parent-enfant). Tout ça avec une interface qui se met à jour automatiquement.","comparaison":{"sans":{"titre":"Sans React — ce que ça aurait coûté","code":"// Vanilla JS pour la même fonctionnalité :\n// ~300 lignes de getElementById, addEventListener,\n// createElement, appendChild, innerHTML...\n// Gestion manuelle de chaque mise à jour\n// Synchronisation entre les différentes parties\n// de l'interface : cauchemar de maintenance","commentaire":"Faisable mais très difficile à maintenir."},"avec":{"titre":"Avec React — ce que ça donne","code":"// Tout s'emboîte proprement :\n// - FeedPage (gère l'état global)\n//   - useEffect (charge les posts au démarrage)\n//   - FormulaireNouveauPost (ajoute un post)\n//     - input contrôlé + onSubmit\n//   - ListePosts (affiche les posts)\n//     - Post × N (chaque post avec bouton like)\n//       - BoutonLike (callback vers FeedPage)\n// Chaque composant : responsabilité unique\n// Données claires, flux prévisible","commentaire":"Architecture claire, maintenable, évolutive."}},"ce_que_fait_react":["Leçon 1 : React = décrire l'état, pas gérer les updates manuellement","Leçons 2-3 : JSX + composants = découper l'interface proprement","Leçon 4 : useState = données qui changent → affichage qui suit","Leçons 5-6 : événements + listes = interaction et données dynamiques","Leçon 7 : useEffect = charger depuis une API au bon moment","Leçons 8-9 : formulaires + props = formulaires complets et communication","Leçon 10 : tout s'assemble → app complète, maintenable, évolutive"]}},{"id":"observe","label":"Observer","type":"observe","titre":"Application Kora complète — tout s'assemble","lignes":[{"code":"// ── COMPOSANT RACINE ─────────────────────────","expl":""},{"code":"function FeedPage() {","expl":"Composant principal — gère tout l'état."},{"code":"  // État global (leçon 4 : useState)","expl":""},{"code":"  const [posts, setPosts] = useState([]);","expl":""},{"code":"  const [loading, setLoading] = useState(true);","expl":""},{"code":"","expl":""},{"code":"  // Chargement initial (leçon 7 : useEffect)","expl":""},{"code":"  useEffect(() => {","expl":""},{"code":"    fetch('/api/posts').then(r => r.json())","expl":""},{"code":"      .then(data => { setPosts(data); setLoading(false); });","expl":""},{"code":"  }, []);","expl":""},{"code":"","expl":""},{"code":"  // Callback like (leçon 8 : parent-enfant)","expl":""},{"code":"  const handleLike = (id) => {","expl":""},{"code":"    setPosts(prev => prev.map(p =>","expl":""},{"code":"      p.id === id ? { ...p, likes: p.likes + 1 } : p","expl":""},{"code":"    ));","expl":""},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  // Ajouter un post (leçon 8 : parent-enfant)","expl":""},{"code":"  const handleNouveauPost = (texte) => {","expl":""},{"code":"    const nouveau = { id: Date.now(), texte, likes: 0 };","expl":""},{"code":"    setPosts(prev => [nouveau, ...prev]);","expl":"Ajouter en début de tableau avec spread."},{"code":"  };","expl":""},{"code":"","expl":""},{"code":"  if (loading) return <p>Chargement...</p>;","expl":""},{"code":"","expl":""},{"code":"  return (","expl":""},{"code":"    <div className=\"feed-page\">","expl":""},{"code":"      {/* Formulaire (leçon 9 : formulaires) */}","expl":""},{"code":"      <FormulairePost onPublier={handleNouveauPost} />","expl":""},{"code":"","expl":""},{"code":"      {/* Liste (leçon 6 : listes) */}","expl":""},{"code":"      {posts.map(p => (","expl":""},{"code":"        <Post key={p.id} post={p} onLike={handleLike} />","expl":""},{"code":"      ))}","expl":""},{"code":"    </div>","expl":""},{"code":"  );","expl":""},{"code":"}","expl":""}]},{"id":"ex1","label":"Ex. 1","type":"ordre","titre":"Remets dans l'ordre","instruction":"Place les blocs dans le bon ordre pour une app React complète et fonctionnelle.","contexte":"Architecture d'un composant qui charge et affiche des données.","items":["  if (loading) return <p>Chargement...</p>;","  const [data, setData] = useState([]);","  return <div>{data.map(d => <Item key={d.id} {...d} />)}</div>;","  const [loading, setLoading] = useState(true);","  useEffect(() => { fetch('/api').then(r => r.json()).then(d => { setData(d); setLoading(false); }); }, []);"],"bonne":[1,3,4,0,2],"explication":"1) Déclarer les états, 2) useEffect pour charger, 3) Return conditionnel (loading), 4) Return principal avec les données."},{"id":"ex2","label":"Ex. 2","type":"devinette","titre":"Devinette finale","question":"Dans une app React, quel est le rôle correct de useState, useEffect et les props ?","choix":["useState = stocker des données permanentes / useEffect = gérer les clics / props = styles","useState = mémoriser des données qui changent / useEffect = effets après rendu / props = données du parent","useState = HTML / useEffect = CSS / props = JavaScript"],"bonne":1,"explication":"useState mémorise des données locales au composant — quand elles changent, React met l'affichage à jour. useEffect exécute du code après le rendu (chargement API, abonnements). Les props sont les données que le parent passe à l'enfant."},{"id":"ex3","label":"Ex. 3","type":"integration","titre":"Intégration finale","instruction":"Complète le composant FormulairePost qui reçoit la callback onPublier et publie un post quand le formulaire est soumis.","contexte":"Composant enfant de FeedPage — écrit un post et signale au parent.","labels":["state du texte","appel callback parent"],"bonnes":["const [texte, setTexte] = useState('')","onPublier(texte); setTexte('')"],"template":"function FormulairePost({ onPublier }) {\n  [A];\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    if (!texte.trim()) return;\n    [B];\n  };\n\n  return (\n    <form onSubmit={handleSubmit}>\n      <textarea\n        value={texte}\n        onChange={(e) => setTexte(e.target.value)}\n        placeholder=\"Quoi de neuf sur Kora ?\"\n      />\n      <button type=\"submit\">Publier</button>\n    </form>\n  );\n}","aide":"useState('') pour le texte. onPublier(texte) appelle la callback du parent. setTexte('') vide le champ après publication."},{"id":"resume","label":"Résumé","type":"resume"}],"resume":[{"icon":"🧩","key":"Composants","val":"Découper l'interface en blocs indépendants."},{"icon":"💾","key":"useState","val":"Données locales qui déclenchent les mises à jour."},{"icon":"🚀","key":"useEffect","val":"Charger les données au bon moment."},{"icon":"🔄","key":"Flux de données","val":"Props ↓ (parent→enfant). Callbacks ↑ (enfant→parent)."}]}];
