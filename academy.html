<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kora Academy — React & JSX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAFA;--white:#FFF;--line:#EFEFEF;--text:#1A1A1A;
  --muted:#737373;--light:#B0B0B0;
  --b1:#6B1F2A;--b2:#C4622D;--b3:#E8956D;--arc:#6BAED6;
  --grad:linear-gradient(135deg,#6B1F2A 0%,#C4622D 50%,#E8956D 100%);
  --ok:#4caf50;--ko:#e57373;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;padding-bottom:90px}
a{text-decoration:none;color:inherit}

/* ── HEADER ─────────────────────────────── */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--line)}
.logo{height:36px;border-radius:8px;padding:3px;box-shadow:0 0 0 1.5px var(--b2),0 0 0 3px rgba(232,149,109,.2);cursor:pointer}
.htitle{font-family:'Fraunces',serif;font-size:.95rem;color:var(--text)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.pbar{width:80px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--grad);border-radius:2px;transition:width .4s}
.ppct{font-size:.72rem;color:var(--muted);min-width:28px;text-align:right}
.bc{display:flex;align-items:center;gap:6px;padding:8px 18px;font-size:.8rem;color:var(--muted);border-bottom:1px solid var(--line);flex-wrap:wrap;min-height:36px}
.bcl{cursor:pointer;transition:color .15s}.bcl:hover{color:var(--b1)}
.bcs{color:var(--line)}.bca{color:var(--b1);font-weight:500}
.etapes{display:flex;padding:0 14px;overflow-x:auto;border-bottom:1px solid var(--line)}
.etapes::-webkit-scrollbar{height:0}
.etape{display:flex;align-items:center;gap:5px;padding:8px 10px;font-size:.76rem;font-family:'DM Sans',sans-serif;color:var(--light);background:transparent;border:none;cursor:pointer;white-space:nowrap;position:relative;transition:color .2s}
.etape.done{color:var(--b2)}.etape.active{color:var(--b1);font-weight:500}
.etape.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);border-radius:2px 2px 0 0}
.edot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:600;flex-shrink:0}
.edot.done{background:var(--grad);color:#fff}.edot.active{background:rgba(107,31,42,.1);color:var(--b1);border:1.5px solid var(--b1)}.edot.idle{background:var(--line);color:var(--light)}

/* ── PAGES ──────────────────────────────── */
.page{display:none}.page.active{display:block}
.wrap{max-width:640px;margin:0 auto;padding:1.6rem 1rem}

/* ── HOME ───────────────────────────────── */
.hero{text-align:center;padding:2rem 1rem 1.2rem;max-width:600px;margin:0 auto}
.hero h2{font-family:'Fraunces',serif;font-size:clamp(1.5rem,4vw,2rem);font-weight:300;letter-spacing:-.03em;line-height:1.3;margin-bottom:.7rem}
.hero p{font-size:.87rem;color:var(--muted);line-height:1.7;max-width:420px;margin:0 auto 1.6rem}
.stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:1.8rem}
.stat{text-align:center}
.stat-n{font-family:'Fraunces',serif;font-size:1.6rem;color:var(--b1)}
.stat-l{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.bloc-card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:1.3rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin:0 1rem 1.2rem}
.bloc-card:hover{border-color:rgba(196,98,45,.3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,31,42,.07)}
.bloc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);opacity:0;transition:opacity .2s}
.bloc-card:hover::before{opacity:1}
.bch{display:flex;align-items:center;gap:12px;margin-bottom:.8rem}
.bci{font-size:1.6rem}.bcn{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:400}
.bcd{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:1rem}
.bcmeta{display:flex;align-items:center;justify-content:space-between}
.bcct{font-size:.74rem;color:var(--light)}
.bcpb{width:70px;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.bcpf{height:100%;background:var(--grad);border-radius:2px;transition:width .4s}

/* ── LECONS LIST ────────────────────────── */
.llist{display:flex;flex-direction:column;gap:8px;padding:0 1rem;max-width:640px;margin:0 auto}
.litem{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--white);border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:all .15s}
.litem:hover{border-color:rgba(196,98,45,.25);background:#FFFAF8}
.litem.done{border-color:rgba(76,175,80,.2);background:#F5FBF5}
.lnum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:600;flex-shrink:0;background:var(--grad);color:#fff}
.lnum.done-n{background:linear-gradient(135deg,#4caf50,#81c784)}
.linfo{flex:1}
.ltitle{font-size:.88rem;font-weight:400;color:var(--text);margin-bottom:2px}
.lsub{font-size:.73rem;color:var(--muted)}
.lbadge{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.badge-new{color:var(--b2);background:rgba(196,98,45,.1);border:1px solid rgba(196,98,45,.2)}
.badge-done{color:#2e7d32;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.2)}

/* ── LECON ──────────────────────────────── */
.ltag{display:inline-flex;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500;color:var(--arc);background:rgba(107,174,214,.1);border:1px solid rgba(107,174,214,.3);border-radius:20px;padding:3px 11px;margin-bottom:10px}
h1.lh{font-family:'Fraunces',serif;font-size:clamp(1.3rem,3.5vw,1.8rem);font-weight:400;letter-spacing:-.03em;line-height:1.2;margin-bottom:1.6rem}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic}
.screen{display:none}.screen.active{display:block}
.card{border:1px solid var(--line);border-radius:14px;padding:1.3rem;margin-bottom:1rem;background:var(--white)}
.card-warm{background:rgba(107,31,42,.03);border-color:rgba(107,31,42,.1)}
.card-blue{background:rgba(107,174,214,.04);border-color:rgba(107,174,214,.2)}
.slabel{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--b2);margin-bottom:.7rem;display:block}
.btext{font-size:.92rem;line-height:1.75;color:var(--text);margin-bottom:.9rem}
.hint{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;background:rgba(107,31,42,.04);border-radius:8px;border:1px solid rgba(107,31,42,.08);margin-top:.5rem}
.htx{font-size:.84rem;color:var(--b1);line-height:1.6}
.exbl{margin-bottom:.9rem}
.exbl-lbl{font-size:.68rem;color:var(--b2);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;margin-bottom:.3rem;text-transform:uppercase;display:block}
pre{background:#FDF6F0;border:1px solid rgba(107,31,42,.1);border-left:3px solid var(--b2);border-radius:10px;padding:.9rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.85;color:var(--text);overflow-x:auto;white-space:pre;margin-bottom:.9rem}
.regles{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
.regle{display:flex;gap:10px;align-items:flex-start;padding:8px 11px;border-radius:8px}
.regle:nth-child(odd){background:#FAFAFA}
.rprop{font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--b1);min-width:110px;flex-shrink:0}
.reff{font-size:.82rem;color:var(--muted);line-height:1.5}

/* ── BTNS ───────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:22px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.btn-p{background:var(--grad);color:#fff}.btn-p:hover{opacity:.88}
.btn-o{background:transparent;color:var(--b1);border:1px solid rgba(107,31,42,.25)}.btn-o:hover{background:rgba(107,31,42,.05)}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--line)}.btn-g:hover{background:#F5F5F5}
.btn:disabled{opacity:.35;cursor:default}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
.tag{display:inline-flex;border-radius:20px;padding:3px 11px;font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tag-a{color:var(--arc);background:rgba(107,174,214,.1);border:1px solid rgba(107,174,214,.3)}
.tag-b{color:var(--b2);background:rgba(196,98,45,.1);border:1px solid rgba(196,98,45,.25)}
.tag-memo{color:#7B5EA7;background:rgba(123,94,167,.1);border:1px solid rgba(123,94,167,.25)}
.tag-debug{color:#E67E22;background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.25)}
.trow{display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap}

/* ── EXERCICES ──────────────────────────── */
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:.9rem}
.opt{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:10px;border:1px solid var(--line);background:var(--white);cursor:pointer;font-size:.86rem;font-family:'DM Sans',sans-serif;color:var(--muted);text-align:left;transition:all .15s;width:100%}
.opt:hover:not(:disabled){border-color:var(--b2);color:var(--b1);background:#FDF6F0}
.opt.sel{border-color:var(--b2);color:var(--b1);background:#FDF6F0}
.opt.ok{border-color:var(--ok);color:#2e7d32;background:#F0F8F0}
.opt.ko{border-color:var(--ko);color:#c62828;background:#FDF0F0}
.oltr{font-family:'Fraunces',serif;opacity:.4;flex-shrink:0;width:18px;margin-top:1px}
.irow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.9rem}
.igrp label{font-size:.73rem;color:var(--muted);display:block;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.igrp input{border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:.83rem;font-family:'JetBrains Mono',monospace;background:var(--white);color:var(--text);outline:none;width:185px;transition:border-color .2s}
.igrp input:focus{border-color:var(--b2)}.igrp input.ok{border-color:var(--ok);background:#F0F8F0}.igrp input.ko{border-color:var(--ko);background:#FDF0F0}
textarea.memo{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:'JetBrains Mono',monospace;font-size:.83rem;color:var(--text);outline:none;resize:vertical;min-height:65px;margin:.7rem 0 .4rem;transition:border-color .2s}
textarea.memo:focus{border-color:rgba(123,94,167,.5)}
.btn-memo{border-radius:20px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.btn-ok{background:rgba(76,175,80,.1);color:#2e7d32;border:1px solid rgba(76,175,80,.3)}
.btn-ko-m{background:rgba(229,115,115,.1);color:#c62828;border:1px solid rgba(229,115,115,.3)}
.fb{border-radius:10px;padding:.9rem;margin-top:9px}
.fb.ok{background:#F0F8F0;border:1px solid var(--ok)}.fb.ko{background:#FDF0F0;border:1px solid var(--ko)}
.fbt{font-weight:600;font-size:.88rem;margin-bottom:4px}
.fb.ok .fbt{color:#2e7d32}.fb.ko .fbt{color:#c62828}
.fbx{color:var(--muted);font-size:.83rem;line-height:1.6}

/* ── RESUME ─────────────────────────────── */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;margin-bottom:1rem}
.ri{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:.9rem}
.ric{font-size:1rem;margin-bottom:.3rem}
.rik{font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--b1);margin-bottom:.2rem;font-weight:500}
.riv{font-size:.8rem;color:var(--muted);line-height:1.5}
.rfooter{border-top:1px solid rgba(107,31,42,.1);padding-top:.9rem;margin-top:.4rem}
.rfooter p{font-size:.8rem;color:var(--muted);line-height:1.6}

/* ── EVAL ZONE ──────────────────────────── */
.eval-card{background:linear-gradient(135deg,rgba(107,31,42,.04),rgba(232,149,109,.06));border:1px solid rgba(196,98,45,.2);border-radius:16px;padding:1.5rem;text-align:center;margin:1.4rem 1rem}
.eval-card h3{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:400;color:var(--text);margin-bottom:.4rem}
.eval-card p{font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:.9rem}
.eval-lock{font-size:.8rem;color:var(--light);margin-top:.4rem}

/* ── MOB NAV ────────────────────────────── */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:200;padding:5px 0}
.mobi{display:flex;justify-content:space-around}
.mitem{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.66rem;color:var(--light);cursor:pointer;padding:4px 14px;transition:color .15s}
.mitem.active{color:var(--b1)}.mic{font-size:1.3rem;line-height:1.2}
@media(max-width:680px){.mobnav{display:block}}
@media(max-width:480px){.regle{flex-direction:column;gap:2px}.rprop{min-width:auto}.wrap{padding:1.2rem .8rem}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="hrow">
    <div style="display:flex;align-items:center;gap:11px">
      <img src="logo.jpg" alt="Kora" class="logo" id="logoBtn">
      <span class="htitle" id="htitle">Kora Academy</span>
    </div>
    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <span class="ppct" id="ppct">0%</span>
    </div>
  </div>
  <div class="bc" id="bc"><span class="bca">React &amp; JSX</span></div>
  <div class="etapes" id="etapes" style="display:none"></div>
</div>

<!-- PAGE : LISTE DES LECONS -->
<div class="page active" id="page-list">
  <div class="hero">
    <h2>React &amp; JSX &mdash; <em class="grad">10 le&ccedil;ons</em></h2>
    <p>Du composant basique au fetch dynamique. Chaque le&ccedil;on contient des exercices interactifs et sauvegarde ta progression automatiquement.</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="statDone">0</div><div class="stat-l">termin&eacute;es</div></div>
      <div class="stat"><div class="stat-n">10</div><div class="stat-l">le&ccedil;ons</div></div>
      <div class="stat"><div class="stat-n" id="statPct">0%</div><div class="stat-l">progression</div></div>
    </div>
  </div>
  <div class="llist" id="llist"></div>
  <div id="evalZone"></div>
</div>

<!-- PAGE : LECON -->
<div class="page" id="page-lecon">
  <div class="wrap">
    <div class="ltag" id="ltag"></div>
    <h1 class="lh" id="lh"></h1>
    <div id="screens"></div>
  </div>
</div>

<!-- MOB NAV -->
<div class="mobnav">
  <div class="mobi">
    <a href="index.html" class="mitem"><span class="mic">&#8962;</span>Accueil</a>
    <div class="mitem active" id="navList"><span class="mic">&#10010;</span>Formation</div>
    <a href="index.html" class="mitem"><span class="mic">&#9711;</span>Profil</a>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────
const LECONS = [
  {
    id: "r1",
    num: 1,
    tag: "React &middot; Le&ccedil;on 1",
    title: "Pourquoi React",
    sub: "Le probl&egrave;me qu&rsquo;il r&eacute;sout",
    pourquoi: "JS vanilla devient chaotique d&egrave;s que l&rsquo;interface devient complexe. React change de paradigme : tu d&eacute;cris &agrave; quoi l&rsquo;UI doit ressembler selon l&rsquo;&eacute;tat, et React se charge de mettre &agrave; jour le DOM.",
    exemple: "Dashboard Kora en temps r&eacute;el &mdash; tokens, posts, notifications. Avec vanilla JS ce serait des centaines de querySelector. Avec React, chaque partie est un composant autonome.",
    exemples: [
      { label: "Vanilla vs React", code: "// Vanilla — imperatif : COMMENT faire\ndocument.querySelector('#score').textContent = score;\nif (score > 100) badge.classList.add('gold');\n\n// React — declaratif : QUOI afficher\nfunction Score({ score }) {\n  return (\n    <div>\n      <span>{score}</span>\n      {score > 100 && <span className=\"gold\">TOP</span>}\n    </div>\n  );\n}" }
    ],
    regles: [
      { prop: "Virtual DOM", expl: "Copie legere du DOM. Diffing puis patch minimal sur le vrai DOM." },
      { prop: "Composant", expl: "Fonction JS qui retourne du JSX. Brique reutilisable." },
      { prop: "State", expl: "Donnees qui declenchent un re-render quand elles changent." },
      { prop: "Declaratif", expl: "On decrit QUOI afficher, React gere COMMENT mettre a jour." }
    ],
    code: "// Probleme vanilla\nfunction updateLikes(id, val) {\n  document.querySelector('#post-' + id + ' .likes')\n    .textContent = val;\n  // Et si le post a ete supprime ? Bug silencieux.\n}\n\n// Solution React\nfunction Post({ id, texte, likes }) {\n  return (\n    <article id={'post-' + id}>\n      <p>{texte}</p>\n      <span className=\"likes\">{likes}</span>\n    </article>\n  );\n  // Si le post disparait, React le retire du DOM automatiquement.",
    exercices: [
      {
        type: "qcm",
        question: "Quel est l'avantage principal du Virtual DOM ?",
        options: ["Il remplace completement le DOM HTML", "Il calcule les changements minimaux plutot que de tout re-rendre", "Il rend les animations automatiques", "Il permet d'ecrire du CSS en JS"],
        bonne: 1,
        explication: "Le Virtual DOM fait du diffing : compare l'ancien et le nouveau, applique uniquement les differences sur le vrai DOM. Moins d'operations = plus rapide."
      },
      {
        type: "completion",
        question: "Complete : approche imperative vs declarative",
        labels: ["vanilla JS", "JSX React"],
        bonnes: ["document.querySelector('#titre').textContent = texte", "<h1>{texte}</h1>"],
        template: "// Imperatif\n[A];\n\n// Declaratif\nreturn [B];"
      },
      {
        type: "memo",
        question: "Definir le Virtual DOM en une phrase.",
        bonne: "Le Virtual DOM est une copie legere du DOM reel que React utilise pour calculer les changements minimaux.",
        indice: "copie legere → diffing → patch minimal",
        explication: "React compare l'ancien et le nouveau Virtual DOM, puis applique seulement les differences sur le vrai DOM."
      },
      {
        type: "debug",
        question: "Erreur conceptuelle. Trouve :",
        codeFaux: "function Page() {\n  document.querySelector('h1').textContent = 'Nouveau';\n  return <h1>Titre</h1>;\n}",
        codeCorrige: "function Page() {\n  return <h1>Nouveau</h1>;\n}",
        options: ["return est interdit ici", "Ne jamais manipuler le DOM directement dans React — laisser React gerer", "h1 est invalide en JSX", "querySelector ne fonctionne pas en React"],
        bonne: 1,
        explication: "Dans React, on ne touche JAMAIS au DOM avec querySelector. On decrit via JSX et React s'en charge."
      }
    ],
    resume: [
      { icon: "🧠", key: "Declaratif", val: "QUOI afficher, pas COMMENT" },
      { icon: "🔄", key: "Virtual DOM", val: "Copie → diffing → patch minimal" },
      { icon: "🧩", key: "Composants", val: "Fonctions JSX reutilisables" },
      { icon: "⚡", key: "Re-render", val: "Auto quand state/props changent" }
    ]
  },
  {
    id: "r2",
    num: 2,
    tag: "React &middot; Le&ccedil;on 2",
    title: "Les composants",
    sub: "Blocs r&eacute;utilisables",
    pourquoi: "Un composant = une fonction qui retourne du JSX. L&rsquo;id&eacute;e est de d&eacute;couper l&rsquo;interface en blocs autonomes et r&eacute;utilisables. Bouton, carte, nav &mdash; chacun est un composant.",
    exemple: "Kora : &lt;Post&gt;, &lt;TokenBadge&gt;, &lt;NavBar&gt;. Chacun g&egrave;re sa propre logique et peut &ecirc;tre r&eacute;utilis&eacute; partout.",
    exemples: [
      { label: "Composant de base", code: "function Bouton({ texte, onClick }) {\n  return (\n    <button\n      onClick={onClick}\n      style={{ background: '#C4622D', color: 'white' }}>\n      {texte}\n    </button>\n  );\n}\n\n// Utilisation\n<Bouton texte=\"Commencer\" onClick={demarrer} />" },
      { label: "Composer des composants", code: "function App() {\n  return (\n    <div>\n      <NavBar />\n      <main>\n        <CarteFormation titre=\"JS\" lecons={15} />\n        <CarteFormation titre=\"React\" lecons={10} />\n      </main>\n    </div>\n  );\n}" }

// ─── STORAGE ─────────────────────────────────────────────────────────
const STORAGE_KEY = 'kora_academy_react';

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function getDefaultData() {
  return {
    leconsDone: {},      // { r1: true, r2: true, ... }
    stepsData: {},       // { r1: { current: 'ex2', done: ['intro','cours','ex1'] } }
    exScores: {},        // { 'r1-ex1': { sel: 2, ok: true } }
    lastVisited: null,
    totalTime: 0,
    startedAt: Date.now()
  };
}

let APP = loadData() || getDefaultData();

function save() { saveData(APP); }

// ─── STATE ────────────────────────────────────────────────────────────
let currentLecon = null;

// ─── UTILS ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function getORD(lecon) {
  return ['intro','cours',...lecon.exercices.map((_,i) => 'ex'+(i+1)),'resume'];
}

// ─── PROGRESSION ─────────────────────────────────────────────────────
function getDone() {
  return LECONS.filter(l => APP.leconsDone[l.id]).length;
}

function getPct() {
  return Math.round((getDone() / LECONS.length) * 100);
}

function updateStats() {
  const done = getDone();
  const pct = getPct();
  const statDone = document.getElementById('statDone');
  const statPct = document.getElementById('statPct');
  if (statDone) statDone.textContent = done;
  if (statPct) statPct.textContent = pct + '%';
}

// ─── LIST PAGE ───────────────────────────────────────────────────────
function renderList() {
  updateStats();
  const done = getDone();
  const total = LECONS.length;

  // Update header
  document.getElementById('htitle').textContent = 'Kora Academy';
  document.getElementById('progWrap').style.display = 'none';
  document.getElementById('etapes').style.display = 'none';
  document.getElementById('bc').innerHTML = '<span class="bca">React &amp; JSX</span>';

  // Lecons list
  const list = document.getElementById('llist');
  list.innerHTML = LECONS.map((l, i) => {
    const d = APP.leconsDone[l.id];
    return `<div class="litem${d ? ' done' : ''}" data-lecon="${l.id}">
      <div class="lnum${d ? ' done-n' : ''}">${d ? '&#10003;' : i+1}</div>
      <div class="linfo">
        <div class="ltitle">${l.title}</div>
        <div class="lsub">${l.sub}</div>
      </div>
      <span class="lbadge ${d ? 'badge-done' : 'badge-new'}">${d ? 'Termin&#233;e' : 'Nouveau'}</span>
    </div>`;
  }).join('');

  // Eval zone
  const allDone = done === total && total > 0;
  document.getElementById('evalZone').innerHTML = `
    <div class="eval-card">
      <h3>&#127919; &#201;valuation React &amp; JSX</h3>
      <p>Compl&#232;te toutes les le&#231;ons pour d&#233;bloquer l&#8217;&#233;valuation et gagner tes tokens KRT.</p>
      ${allDone
        ? '<button class="btn btn-p" id="startEval">Commencer l&#8217;&#233;valuation &rarr;</button>'
        : `<button class="btn btn-g" disabled>Commencer l&#8217;&#233;valuation &rarr;</button>
           <p class="eval-lock">${done}/${total} le&#231;ons termin&#233;es</p>`
      }
    </div>`;

  // Event delegation for list items
  list.onclick = (e) => {
    const item = e.target.closest('.litem');
    if (item) showLecon(item.dataset.lecon);
  };

  if (allDone) {
    document.getElementById('startEval').onclick = () => {
      alert('Evaluation a venir !');
    };
  }

  showPage('list');
}

// ─── LECON PAGE ──────────────────────────────────────────────────────
function showLecon(leconId) {
  currentLecon = LECONS.find(l => l.id === leconId);
  if (!currentLecon) return;

  // Init lecon data if needed
  if (!APP.stepsData[leconId]) {
    APP.stepsData[leconId] = { current: 'intro', done: [] };
    save();
  }

  APP.lastVisited = leconId;
  save();

  // Header
  document.getElementById('htitle').textContent = currentLecon.title;
  document.getElementById('progWrap').style.display = 'flex';
  document.getElementById('bc').innerHTML = `
    <span class="bcl" id="bcHome">React &amp; JSX</span>
    <span class="bcs"> &rsaquo; </span>
    <span class="bca">${currentLecon.title}</span>`;

  document.getElementById('bcHome').onclick = () => renderList();
  document.getElementById('ltag').innerHTML = currentLecon.tag;
  document.getElementById('lh').innerHTML = currentLecon.title + ' &mdash; <span class="grad">' + currentLecon.sub + '</span>';

  renderLecon();
  showPage('lecon');
}

function renderLecon() {
  if (!currentLecon) return;
  const lid = currentLecon.id;
  const sd = APP.stepsData[lid];
  const ORD = getORD(currentLecon);
  const cur = sd.current;
  const labels = ['Intro','Cours',...currentLecon.exercices.map((_,i) => 'Ex.'+(i+1)),'R&#233;sum&#233;'];

  // Etapes nav
  const etapes = document.getElementById('etapes');
  etapes.style.display = 'flex';
  etapes.innerHTML = ORD.map((sid, i) => {
    const done = sd.done.includes(sid);
    const active = sid === cur;
    const cls = done ? 'done' : active ? 'active' : '';
    const dcls = done ? 'done' : active ? 'active' : 'idle';
    return `<button class="etape ${cls}" data-step="${sid}">
      <span class="edot ${dcls}">${done ? '&#10003;' : i+1}</span>${labels[i]}
    </button>`;
  }).join('');

  // Progress bar
  const idx = ORD.indexOf(cur);
  const pct = Math.round((idx / (ORD.length - 1)) * 100);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('ppct').textContent = pct + '%';

  // Event delegation for etapes
  etapes.onclick = (e) => {
    const btn = e.target.closest('.etape');
    if (btn) goStep(btn.dataset.step);
  };

  // Render screen
  document.getElementById('screens').innerHTML = renderScreen(cur);
  bindScreenEvents();
}

function renderScreen(cur) {
  const lecon = currentLecon;
  const lid = lecon.id;
  const ORD = getORD(lecon);
  const next = ORD[ORD.indexOf(cur) + 1];

  if (cur === 'intro') {
    const exs = (lecon.exemples || []).map(ex =>
      `<div class="exbl"><span class="exbl-lbl">${ex.label}</span><pre>${esc(ex.code)}</pre></div>`
    ).join('');
    return `<div class="screen active">
      <div class="card card-warm">
        <span class="slabel">Pourquoi tu as besoin de &#231;a</span>
        <p class="btext">${lecon.pourquoi}</p>
        ${lecon.exemple ? `<div class="hint"><span style="color:var(--b3);flex-shrink:0;margin-top:2px">&#9672;</span><span class="htx">${lecon.exemple}</span></div>` : ''}
      </div>
      ${exs ? `<div class="card"><span class="slabel">Exemples dans ce cours</span>${exs}</div>` : ''}
      <button class="btn btn-p" data-goto="cours">Commencer &rarr;</button>
    </div>`;
  }

  if (cur === 'cours') {
    const regs = lecon.regles.map(r =>
      `<div class="regle"><span class="rprop">${r.prop}</span><span class="reff">${r.expl}</span></div>`
    ).join('');
    return `<div class="screen active">
      <div class="card">
        <span class="slabel">Les r&#232;gles &#224; retenir</span>
        <div class="regles">${regs}</div>
      </div>
      <div class="card">
        <span class="slabel">Exemple &mdash; lis chaque ligne</span>
        <pre>${esc(lecon.code)}</pre>
      </div>
      <button class="btn btn-p" data-goto="ex1">Je comprends &mdash; exercice &rarr;</button>
    </div>`;
  }

  if (cur === 'resume') {
    const items = lecon.resume.map(r =>
      `<div class="ri"><div class="ric">${r.icon}</div><div class="rik">${r.key}</div><div class="riv">${r.val}</div></div>`
    ).join('');
    return `<div class="screen active">
      <div class="card card-warm">
        <span class="slabel">&#10022; Ce que tu retiens</span>
        <div class="rgrid">${items}</div>
        <div class="rfooter"><p>Les tokens KRT sont accord&#233;s &agrave; la fin de l&#8217;&#233;valuation selon ta note.</p></div>
      </div>
      <div class="brow">
        <button class="btn btn-g" data-goto="intro">&#8592; Revoir</button>
        <button class="btn btn-p" id="finBtn">Le&#231;on suivante &rarr;</button>
      </div>
    </div>`;
  }

  // Exercice
  const exIdx = parseInt(cur.replace('ex','')) - 1;
  const ex = lecon.exercices[exIdx];
  const sk = lid + '-' + cur;
  const saved = APP.exScores[sk];
  const typeLbl = { qcm:'QCM', completion:'Compl&#233;ter', memo:'M&#233;mo', debug:'D&#233;boguer' }[ex.type];
  const tagCls = { qcm:'tag-b', completion:'tag-a', memo:'tag-memo', debug:'tag-debug' }[ex.type];

  let inner = '';

  if (ex.type === 'qcm' || ex.type === 'debug') {
    const opts = ex.options.map((o, i) => {
      let cls = '';
      if (saved) {
        if (i === ex.bonne) cls = 'ok';
        else if (i === saved.sel && saved.sel !== ex.bonne) cls = 'ko';
      }
      return `<button class="opt${cls ? ' '+cls : ''}" data-idx="${i}" ${saved?'disabled':''}><span class="oltr">${['A','B','C','D'][i]}.</span>${o}</button>`;
    }).join('');
    const codeF = ex.type === 'debug' ? `<span class="slabel" style="margin-top:.5rem">Code avec erreur</span><pre>${esc(ex.codeFaux)}</pre>` : '';
    const fb = saved ? `<div class="fb ${saved.ok?'ok':'ko'}"><p class="fbt">${saved.ok?'&#10003; Correct':'&#10007; Pas tout &#224; fait'}</p><p class="fbx">${ex.explication}</p>
      ${ex.type==='debug' ? `<span class="slabel" style="margin-top:.8rem">Code corrig&#233;</span><pre style="margin-top:.4rem">${esc(ex.codeCorrige)}</pre>` : ''}
      ${saved.ok ? `<div class="brow"><button class="btn btn-o" data-goto="${next}">Suivant &rarr;</button></div>` : `<div class="brow"><button class="btn btn-g" data-redo="${sk}">R&#233;essayer</button></div>`}
    </div>` : '';
    inner = `<p class="btext">${ex.question}</p>${codeF}<div class="opts" id="opts-${sk}">${opts}</div><div id="fb-${sk}">${fb}</div>
      ${!saved ? `<div class="brow"><button class="btn btn-p" id="val-${sk}" disabled>Valider &rarr;</button></div>` : ''}`;
  }

  if (ex.type === 'completion') {
    const inputs = ex.labels.map((lbl, i) => {
      const v = saved ? saved.vals[i] || '' : '';
      const cls = saved ? (saved.valOk[i] ? ' ok' : ' ko') : '';
      return `<div class="igrp"><label>${['A','B','C'][i]} &mdash; ${lbl}</label><input data-comp="${sk}" data-ci="${i}" value="${v}" ${saved?'disabled':''} placeholder="ta r&#233;ponse&hellip;" class="${cls.trim()}"></div>`;
    }).join('');
    const prev = saved ? ex.template.replace(/\[A\]/g, saved.vals[0]||'?').replace(/\[B\]/g, saved.vals[1]||'?').replace(/\[C\]/g, saved.vals[2]||'?') : ex.template.replace(/\[A\]/g,'[?]').replace(/\[B\]/g,'[?]').replace(/\[C\]/g,'[?]');
    const fb = saved ? `<div class="fb ${saved.ok?'ok':'ko'}"><p class="fbt">${saved.ok?'&#10003; Correct':'&#10007; Attendu : '+ex.bonnes.join(' &middot; ')}</p>
      ${saved.ok ? `<div class="brow"><button class="btn btn-o" data-goto="${next}">Suivant &rarr;</button></div>` : `<div class="brow"><button class="btn btn-g" data-redo="${sk}">R&#233;essayer</button></div>`}
    </div>` : '';
    inner = `<p class="btext">${ex.question}</p><div class="irow">${inputs}</div><pre id="prev-${sk}">${esc(prev)}</pre><div id="fb-${sk}">${fb}</div>
      ${!saved ? `<div class="brow"><button class="btn btn-p" id="val-${sk}" disabled>Valider &rarr;</button></div>` : ''}`;
  }

  if (ex.type === 'memo') {
    const fb = saved ? `<div class="card card-blue" style="margin-top:.8rem"><span class="slabel" style="color:var(--arc)">Ta r&#233;ponse</span><pre style="background:transparent;border:none;padding:0">${esc(saved.input)}</pre></div>
      <div class="card card-warm" style="margin-top:.8rem"><span class="slabel">R&#233;ponse attendue</span><pre style="background:transparent;border:none;padding:0">${esc(ex.bonne)}</pre><p style="font-size:.82rem;color:var(--muted);margin-top:.6rem;line-height:1.6">${ex.explication}</p></div>` : '';
    inner = `<p class="btext">${ex.question}</p>
      <div class="card card-blue" style="text-align:center;padding:1.2rem;margin-bottom:1rem">
        <p style="font-size:.68rem;color:var(--arc);font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem">INDICE</p>
        <p style="font-family:Fraunces,serif;font-size:.93rem;color:var(--text)">${ex.indice}</p>
      </div>
      ${!saved ? `<textarea class="memo" id="memo-${sk}" placeholder="&#201;cris ta r&#233;ponse sans regarder le cours&hellip;" rows="3"></textarea>` : ''}
      <div id="fb-${sk}">${fb}</div>
      ${!saved ? `<div class="brow">
        <button class="btn btn-p" id="val-${sk}">V&#233;rifier &rarr;</button>
        <button class="btn btn-g" data-show-answer="${sk}">Voir la r&#233;ponse</button>
      </div>` : `<div class="brow">
        <button class="btn btn-memo btn-ok" data-goto="${next}">&#10003; J&#8217;avais bon</button>
        <button class="btn btn-memo btn-ko-m" data-goto="${next}">&#10007; &#192; retenir</button>
      </div>`}`;
  }

  return `<div class="screen active">
    <div class="card">
      <div class="trow">
        <span class="tag tag-a">Exercice ${exIdx+1} / ${lecon.exercices.length}</span>
        <span class="tag ${tagCls}">${typeLbl}</span>
      </div>
      ${inner}
    </div>
  </div>`;
}

function bindScreenEvents() {
  const lecon = currentLecon;
  const lid = lecon.id;
  const ORD = getORD(lecon);
  const cur = APP.stepsData[lid].current;
  const next = ORD[ORD.indexOf(cur) + 1];

  // data-goto buttons
  document.querySelectorAll('[data-goto]').forEach(btn => {
    btn.onclick = () => goStep(btn.dataset.goto);
  });

  // fin button
  const finBtn = document.getElementById('finBtn');
  if (finBtn) finBtn.onclick = () => finirLecon();

  // logo
  document.getElementById('logoBtn').onclick = () => renderList();
  document.getElementById('navList').onclick = () => renderList();

  const exIdx = parseInt(cur.replace('ex','')) - 1;
  if (isNaN(exIdx)) return;
  const ex = lecon.exercices[exIdx];
  const sk = lid + '-' + cur;

  // QCM / Debug
  if (ex.type === 'qcm' || ex.type === 'debug') {
    const valBtn = document.getElementById('val-' + sk);
    let sel = null;

    document.querySelectorAll('.opt:not([disabled])').forEach(opt => {
      opt.onclick = () => {
        sel = parseInt(opt.dataset.idx);
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
        opt.classList.add('sel');
        if (valBtn) valBtn.disabled = false;
      };
    });

    if (valBtn) {
      valBtn.onclick = () => {
        if (sel === null) return;
        const ok = sel === ex.bonne;
        APP.exScores[sk] = { sel, ok };
        save();
        renderLecon();
      };
    }
  }

  // Completion
  if (ex.type === 'completion') {
    const valBtn = document.getElementById('val-' + sk);
    const inputs = document.querySelectorAll('[data-comp="' + sk + '"]');
    const prev = document.getElementById('prev-' + sk);

    function updatePrev() {
      let t = ex.template;
      inputs.forEach((inp, i) => {
        t = t.replace(['[A]','[B]','[C]'][i], inp.value || ['[?]','[?]','[?]'][i]);
      });
      if (prev) prev.textContent = t;
      if (valBtn) valBtn.disabled = !Array.from(inputs).every(inp => inp.value.trim());
    }

    inputs.forEach(inp => { inp.oninput = updatePrev; });

    if (valBtn) {
      valBtn.onclick = () => {
        const vals = Array.from(inputs).map(inp => inp.value.trim());
        const valOk = vals.map((v, i) => v.toLowerCase() === ex.bonnes[i].toLowerCase());
        const ok = valOk.every(Boolean);
        APP.exScores[sk] = { vals, valOk, ok };
        save();
        renderLecon();
      };
    }
  }

  // Memo
  if (ex.type === 'memo') {
    const valBtn = document.getElementById('val-' + sk);
    const showAns = document.querySelector('[data-show-answer="' + sk + '"]');

    if (valBtn) {
      valBtn.onclick = () => {
        const input = document.getElementById('memo-' + sk);
        if (!input || !input.value.trim()) return;
        APP.exScores[sk] = { input: input.value.trim(), shown: false };
        save();
        renderLecon();
      };
    }

    if (showAns) {
      showAns.onclick = () => {
        const fb = document.getElementById('fb-' + sk);
        if (fb) fb.innerHTML = `<div class="card card-warm"><span class="slabel">R&#233;ponse</span><pre style="background:transparent;border:none;padding:0">${esc(ex.bonne)}</pre></div>`;
      };
    }
  }

  // data-redo
  document.querySelectorAll('[data-redo]').forEach(btn => {
    btn.onclick = () => {
      delete APP.exScores[btn.dataset.redo];
      save();
      renderLecon();
    };
  });
}

// ─── NAVIGATION ──────────────────────────────────────────────────────
function goStep(sid) {
  if (!currentLecon) return;
  const lid = currentLecon.id;
  const sd = APP.stepsData[lid];
  if (!sd.done.includes(sd.current)) sd.done.push(sd.current);
  sd.current = sid;
  save();
  renderLecon();
  window.scrollTo(0, 0);
}

function finirLecon() {
  if (!currentLecon) return;
  APP.leconsDone[currentLecon.id] = true;
  save();
  renderList();
}

// ─── INIT ─────────────────────────────────────────────────────────────
document.getElementById('logoBtn').onclick = () => renderList();
document.getElementById('navList').onclick = () => renderList();

// Resume last visited lecon or show list
if (APP.lastVisited && !APP.leconsDone[APP.lastVisited]) {
  showLecon(APP.lastVisited);
} else {
  renderList();
}
</script>
</body>
</html>
