<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kora Academy — Formations</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAFA;--w:#FFFFFF;--line:#EFEFEF;--text:#1A1A1A;--muted:#737373;--light:#B0B0B0;--b1:#6B1F2A;--b2:#C4622D;--b3:#E8956D;--grad:linear-gradient(135deg,#6B1F2A 0%,#C4622D 50%,#E8956D 100%)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 20px;height:56px;display:flex;align-items:center;gap:14px}
.header-logo{font-family:'Fraunces',serif;font-size:17px;font-weight:600;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.krt-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(107,31,42,0.05);border-radius:20px;border:1px solid rgba(107,31,42,0.1)}
.krt-val{font-size:12px;font-weight:500;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.global-progress{height:3px;background:var(--line)}.global-progress-fill{height:100%;background:var(--grad);transition:width 0.6s ease}

/* HERO */
.hero{padding:32px 20px 24px;max-width:740px;margin:0 auto}
.hero-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--b2);font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hero-label::before{content:'';width:14px;height:1.5px;background:var(--grad)}
.hero-title{font-family:'Fraunces',serif;font-size:clamp(24px,5vw,38px);font-weight:300;letter-spacing:-1px;line-height:1.15;margin-bottom:8px}
.hero-title em{font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:460px;margin-bottom:20px}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:var(--muted)}

/* CONTINUER SECTION */
.continuer-section{padding:0 20px 20px;max-width:740px;margin:0 auto}
.continuer-card{padding:18px 20px;background:var(--w);border-radius:16px;border:1px solid rgba(107,31,42,0.12);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s;text-decoration:none}
.continuer-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(107,31,42,0.1);border-color:rgba(107,31,42,0.2)}
.cc-icon{width:44px;height:44px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:white}
.cc-info{flex:1;min-width:0}
.cc-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--b2);font-weight:500;margin-bottom:3px}
.cc-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-sub{font-size:12px;color:var(--muted);margin-top:2px}
.cc-arrow{font-size:18px;color:var(--b2);flex-shrink:0}

/* CATEGORIES NAV */
.cat-nav-wrap{position:sticky;top:56px;z-index:90;background:var(--w);border-bottom:1px solid var(--line)}
.cat-nav{display:flex;overflow-x:auto;padding:0 20px;max-width:740px;margin:0 auto}
.cat-nav::-webkit-scrollbar{height:0}
.cat-tab{padding:13px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px}
.cat-tab.active{color:var(--b1);font-weight:500;border-bottom-color:var(--b2)}
.cat-tab-dot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background 0.2s}
.cat-tab.active .cat-tab-dot{background:var(--b2)}
.cat-tab-pct{font-size:10px;color:var(--light);font-family:'JetBrains Mono',monospace}

/* FORMATION VIEW */
.formation-view{display:none;max-width:740px;margin:0 auto;padding:0 20px}
.formation-view.active{display:block}

.formation-header{padding:24px 0 16px;display:flex;align-items:flex-start;gap:14px}
.fh-icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.fh-info{flex:1}
.fh-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--b2);font-weight:500;margin-bottom:4px}
.fh-title{font-family:'Fraunces',serif;font-size:22px;font-weight:300;letter-spacing:-0.5px;margin-bottom:4px;line-height:1.2}
.fh-sub{font-size:13px;color:var(--muted);line-height:1.5}
.fh-progress-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.fh-bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.fh-bar-fill{height:100%;background:var(--grad);border-radius:3px;transition:width 0.4s}
.fh-pct{font-size:12px;font-weight:500;color:var(--b2);font-family:'JetBrains Mono',monospace}

.chapters-list{display:flex;flex-direction:column;gap:20px;padding-bottom:40px}

.chapter-block{border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--w)}
.chapter-head{padding:14px 18px;background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.ch-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500}
.ch-pct{font-size:11px;color:var(--b2);font-family:'JetBrains Mono',monospace}

.modules-grid{display:flex;flex-direction:column;gap:0}
.module-row{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;text-decoration:none;color:inherit;transition:background 0.12s;position:relative}
.module-row:last-child{border-bottom:none}
.module-row:hover{background:rgba(107,31,42,0.03)}
.module-row.locked{opacity:0.45;cursor:not-allowed;pointer-events:none}
.module-row.active-module{background:rgba(107,31,42,0.04)}
.mr-status{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-right:12px;border:1.5px solid var(--line);background:var(--w);transition:all 0.2s}
.module-row.done .mr-status{background:var(--grad);border:none;color:white}
.module-row.in-progress .mr-status{border-color:var(--b2);background:rgba(107,31,42,0.06);color:var(--b2)}
.module-row.locked .mr-status{background:var(--bg);color:var(--light)}
.mr-info{flex:1;min-width:0}
.mr-num{font-size:10px;color:var(--light);font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.mr-title{font-size:13px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.module-row.done .mr-title{color:var(--muted)}
.mr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.mr-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.mr-badge.new{background:rgba(196,98,45,0.1);color:var(--b2);border:1px solid rgba(196,98,45,0.15)}
.mr-badge.eval{background:rgba(107,31,42,0.08);color:var(--b1);border:1px solid rgba(107,31,42,0.12)}
.mr-progress-mini{width:36px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.mr-progress-mini-fill{height:100%;background:var(--b2);border-radius:2px}
.mr-arrow{font-size:14px;color:var(--light)}
.module-row.done .mr-arrow{color:#28CA41}
.module-row.in-progress .mr-arrow{color:var(--b2)}

/* Couleurs par formation */
.icon-code{background:linear-gradient(135deg,#6B1F2A,#C4622D)}
.icon-js{background:linear-gradient(135deg,#1A3A6B,#2563EB)}
.icon-python{background:linear-gradient(135deg,#1A4A2A,#2ECC71)}
.icon-debug{background:linear-gradient(135deg,#4A1A6B,#9B59B6)}
.icon-cyber{background:linear-gradient(135deg,#4A0A0A,#C0392B)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 20px;display:flex;justify-content:space-around;z-index:80}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;border-radius:12px;transition:background 0.15s;text-decoration:none;color:var(--muted);font-size:11px;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.bn-item.active{color:var(--b1)}
.bn-item.active .bn-icon{color:var(--b1)}
.bn-icon{font-size:20px;color:var(--light)}

@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.formation-view.active{animation:up 0.3s ease both}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">Kora</div>
  <div class="header-right">
    <div class="krt-badge">
      <span style="font-size:11px;color:var(--b2)">◈</span>
      <span class="krt-val" id="krtVal">248 KRT</span>
    </div>
  </div>
</header>
<div class="global-progress"><div class="global-progress-fill" id="globalFill" style="width:0%"></div></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">Kora Academy</div>
  <div class="hero-title">Apprends. <em>Gagnes.</em></div>
  <div class="hero-sub">Des formations completes du code a l'IA. Chaque module valide = KRT gagnes.</div>
  <div class="hero-stats">
    <div class="stat"><span class="stat-val" id="stat-modules">0</span><span class="stat-label">Modules termines</span></div>
    <div class="stat"><span class="stat-val" id="stat-pct">0%</span><span class="stat-label">Progression globale</span></div>
    <div class="stat"><span class="stat-val" id="stat-krt">248</span><span class="stat-label">KRT accumules</span></div>
  </div>
</div>

<!-- CONTINUER CARD -->
<div class="continuer-section">
  <a class="continuer-card" id="continuerCard" href="#">
    <div class="cc-icon" id="continuerIcon">▶</div>
    <div class="cc-info">
      <div class="cc-label">Continuer</div>
      <div class="cc-title" id="continuerTitle">Chargement...</div>
      <div class="cc-sub" id="continuerSub"></div>
    </div>
    <div class="cc-arrow">→</div>
  </a>
</div>

<!-- CATEGORIES NAV -->
<div class="cat-nav-wrap">
  <div class="cat-nav" id="catNav"></div>
</div>

<!-- FORMATION VIEWS -->
<div id="formationViews"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bn-item active" onclick="goToAcademy()">
    <span class="bn-icon">📚</span>Formation
  </button>
  <a class="bn-item" href="index.html">
    <span class="bn-icon">👤</span>Profil
  </a>
</div>

<script>
// =============================================
// CONFIGURATION DES FORMATIONS
// =============================================
var FORMATIONS = [
  {
    id: 'codage',
    label: 'Le Code',
    icon: '💻',
    iconClass: 'icon-code',
    description: 'HTML, CSS, JavaScript et Python — de zero a la pratique',
    chapitres: [
      {
        id: 'html', label: 'Chapitre 1 — HTML', modules: [
          {id:'codage1', titre:'Introduction HTML', file:'formation-codage.html'},
          {id:'codage2', titre:'Texte et typographie', file:'formation-codage2.html'},
          {id:'codage3', titre:'Liens et images', file:'formation-codage3.html'},
          {id:'codage4', titre:'Listes et tableaux', file:'formation-codage4.html'},
          {id:'codage5', titre:'Formulaires', file:'formation-codage5.html'},
          {id:'codage6', titre:'Structure semantique', file:'formation-codage6.html'},
          {id:'codage7', titre:'Pratique reelle', file:'formation-codage7.html'},
          {id:'codage8', titre:'Evaluation HTML', file:'formation-codage8.html', badge:'eval'},
        ]
      },
      {
        id: 'css', label: 'Chapitre 2 — CSS', modules: [
          {id:'css1', titre:'C\'est quoi le CSS', file:'css1.html'},
          {id:'css2', titre:'Les selecteurs', file:'css2.html'},
          {id:'css3', titre:'Couleurs et fonds', file:'css3.html'},
          {id:'css4', titre:'Texte et typographie', file:'css4.html'},
          {id:'css5', titre:'Le modele de boite', file:'css5.html'},
          {id:'css6', titre:'Display et visibilite', file:'css6.html'},
          {id:'css7', titre:'Position et z-index', file:'css7.html'},
          {id:'css8', titre:'Flexbox', file:'css8.html'},
          {id:'css9', titre:'CSS Grid', file:'css9.html'},
          {id:'css10', titre:'Responsive et media queries', file:'css10.html'},
          {id:'css11', titre:'Pseudo-classes', file:'css11.html'},
          {id:'css12', titre:'Variables CSS', file:'css12.html'},
          {id:'css13', titre:'Transitions et animations', file:'css13.html'},
          {id:'css14', titre:'Pratique reelle', file:'css14.html'},
          {id:'css15', titre:'Evaluation CSS', file:'css15.html', badge:'eval'},
        ]
      },
      {
        id: 'js', label: 'Chapitre 3 — JavaScript', modules: [
          {id:'js1', titre:'C\'est quoi JavaScript', file:'js1.html'},
          {id:'js2', titre:'Variables et types', file:'js2.html'},
          {id:'js3', titre:'Operateurs et conditions', file:'js3.html'},
          {id:'js4', titre:'Fonctions', file:'js4.html'},
          {id:'js5', titre:'Tableaux et objets', file:'js5.html'},
          {id:'js6', titre:'Boucles', file:'js6.html'},
          {id:'js7', titre:'Le DOM', file:'js7.html'},
          {id:'js8', titre:'Evenements', file:'js8.html'},
          {id:'js9', titre:'Fetch et APIs', file:'js9.html'},
          {id:'js10', titre:'LocalStorage', file:'js10.html'},
          {id:'js11', titre:'Mini-app crypto', file:'js11.html'},
          {id:'js12', titre:'Evaluation JavaScript', file:'js12.html', badge:'eval'},
        ]
      },
      {
        id: 'debug', label: 'Chapitre 4 — Debogage', bientot: true, modules: [
          {id:'debug1', titre:'DevTools et console', file:'debug1.html', bientot:true},
          {id:'debug2', titre:'Erreurs courantes', file:'debug2.html', bientot:true},
          {id:'debug3', titre:'Breakpoints et inspection', file:'debug3.html', bientot:true},
        ]
      },
      {
        id: 'cyber', label: 'Chapitre 5 — Cybersecurite', bientot: true, modules: [
          {id:'cyber1', titre:'HTTPS et chiffrement', file:'cyber1.html', bientot:true},
          {id:'cyber2', titre:'XSS et injections', file:'cyber2.html', bientot:true},
          {id:'cyber3', titre:'Bonnes pratiques', file:'cyber3.html', bientot:true},
        ]
      }
    ]
  },
  {
    id: 'crypto',
    label: 'Crypto & Trading',
    icon: '₿',
    iconClass: 'icon-js',
    description: 'Comprendre et trader les cryptomonnaies',
    bientot: true,
    chapitres: []
  },
  {
    id: 'finance',
    label: 'Finance & Invest.',
    icon: '📈',
    iconClass: 'icon-python',
    description: 'Budget, investissement, liberte financiere',
    bientot: true,
    chapitres: []
  }
];

// =============================================
// STATE
// =============================================
var prog = {};
var krt = 248;
var currentCat = 'codage';

function chargerProg() {
  try {
    var raw = localStorage.getItem('kora_prog');
    if (raw) { prog = JSON.parse(raw); krt = prog.krt || 248; }
  } catch(e) {}
}

function getModuleStatus(moduleId) {
  var val = prog[moduleId];
  if (val === 99) return 'done';
  if (val && val > 0) return 'in-progress';
  return 'locked';
}

function getModuleProgress(moduleId) {
  return prog[moduleId] || 0;
}

// =============================================
// CALCULS STATS
// =============================================
function calcStats() {
  var totalModules = 0;
  var doneModules = 0;
  FORMATIONS.forEach(function(f) {
    if (f.bientot) return;
    f.chapitres.forEach(function(ch) {
      if (ch.bientot) return;
      ch.modules.forEach(function(m) {
        if (m.bientot) return;
        totalModules++;
        if (getModuleStatus(m.id) === 'done') doneModules++;
      });
    });
  });
  return { total: totalModules, done: doneModules, pct: totalModules ? Math.round(doneModules/totalModules*100) : 0 };
}

function calcFormationProgress(formation) {
  var total = 0; var done = 0;
  if (formation.bientot) return 0;
  formation.chapitres.forEach(function(ch) {
    if (ch.bientot) return;
    ch.modules.forEach(function(m) {
      if (m.bientot) return;
      total++;
      if (getModuleStatus(m.id) === 'done') done++;
    });
  });
  return total ? Math.round(done/total*100) : 0;
}

function calcChapitreProgress(chapitre) {
  var total = 0; var done = 0;
  if (chapitre.bientot) return 0;
  chapitre.modules.forEach(function(m) {
    if (m.bientot) return;
    total++;
    if (getModuleStatus(m.id) === 'done') done++;
  });
  return total ? Math.round(done/total*100) : 0;
}

// =============================================
// TROUVER LE PROCHAIN MODULE
// =============================================
function nextModule() {
  var result = null;
  FORMATIONS.forEach(function(f) {
    if (f.bientot || result) return;
    f.chapitres.forEach(function(ch) {
      if (ch.bientot || result) return;
      ch.modules.forEach(function(m) {
        if (m.bientot || result) return;
        var st = getModuleStatus(m.id);
        if (st !== 'done') {
          if (!result) result = { module: m, formation: f, chapitre: ch };
        }
      });
    });
  });
  return result;
}

// =============================================
// RENDER UI
// =============================================
function renderCatNav() {
  var nav = document.getElementById('catNav');
  nav.innerHTML = FORMATIONS.map(function(f) {
    var pct = calcFormationProgress(f);
    var isActive = f.id === currentCat;
    return '<button class="cat-tab'+(isActive?' active':'')+'" onclick="switchCat(\''+f.id+'\')" '+(f.bientot?'disabled':'')+' style="'+(f.bientot?'opacity:0.4':'')+'">'
      +'<div class="cat-tab-dot"></div>'
      +f.label
      +(f.bientot?'<span style="font-size:10px;color:var(--light)"> · Bientot</span>':('<span class="cat-tab-pct">'+pct+'%</span>'))
      +'</button>';
  }).join('');
}

function renderFormations() {
  var container = document.getElementById('formationViews');
  container.innerHTML = FORMATIONS.map(function(f) {
    if (f.bientot) {
      return '<div class="formation-view" id="view-'+f.id+'">'
        +'<div class="formation-header">'
        +'<div class="fh-icon-wrap '+f.iconClass+'">'+f.icon+'</div>'
        +'<div class="fh-info"><div class="fh-label">Formation</div><div class="fh-title">'+f.label+'</div>'
        +'<div class="fh-sub">'+f.description+'</div></div></div>'
        +'<div style="padding:40px 0;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:12px">🔒</div><div style="font-family:\'Fraunces\',serif;font-size:20px;margin-bottom:8px">Bientot disponible</div><div style="font-size:14px">Cette formation est en cours de creation. Reviens bientot !</div></div>'
        +'</div>';
    }

    var pct = calcFormationProgress(f);
    var chapHTML = f.chapitres.map(function(ch) {
      var chPct = calcChapitreProgress(ch);

      var modulesHTML = ch.modules.map(function(m) {
        if (m.bientot) {
          return '<div class="module-row locked">'
            +'<div class="mr-status">🔒</div>'
            +'<div class="mr-info"><div class="mr-num">Module</div><div class="mr-title">'+m.titre+'</div></div>'
            +'<div class="mr-right"><span class="mr-badge new">Bientot</span></div>'
            +'</div>';
        }
        var st = getModuleStatus(m.id);
        var p = getModuleProgress(m.id);
        var icon = st==='done'?'✓':st==='in-progress'?'▶':'○';
        var progressMini = '';
        if (st==='in-progress' && p>0) {
          var maxPart = m.id.startsWith('css')?15:m.id.startsWith('js')?12:8;
          var pct2 = Math.round(p/maxPart*100);
          progressMini = '<div class="mr-progress-mini"><div class="mr-progress-mini-fill" style="width:'+pct2+'%"></div></div>';
        }
        var arrow = st==='done'?'✓':st==='in-progress'?'→':'›';
        var badgeHTML = m.badge?'<span class="mr-badge '+(m.badge==='eval'?'eval':'new')+'">'+m.badge+'</span>':'';
        return '<a class="module-row '+st+'" href="'+m.file+'">'
          +'<div class="mr-status">'+icon+'</div>'
          +'<div class="mr-info">'
          +'<div class="mr-num">Module '+(ch.modules.indexOf(m)+1)+'</div>'
          +'<div class="mr-title">'+m.titre+'</div>'
          +'</div>'
          +'<div class="mr-right">'+badgeHTML+progressMini+'<span class="mr-arrow">'+arrow+'</span></div>'
          +'</a>';
      }).join('');

      return '<div class="chapter-block">'
        +'<div class="chapter-head">'
        +'<span class="ch-label">'+ch.label+(ch.bientot?' · Bientot':' ')+'</span>'
        +'<span class="ch-pct">'+chPct+'%</span>'
        +'</div>'
        +'<div class="modules-grid">'+modulesHTML+'</div>'
        +'</div>';
    }).join('');

    return '<div class="formation-view" id="view-'+f.id+'">'
      +'<div class="formation-header">'
      +'<div class="fh-icon-wrap '+f.iconClass+'">'+f.icon+'</div>'
      +'<div class="fh-info">'
      +'<div class="fh-label">Formation</div>'
      +'<div class="fh-title">'+f.label+'</div>'
      +'<div class="fh-sub">'+f.description+'</div>'
      +'<div class="fh-progress-row">'
      +'<div class="fh-bar"><div class="fh-bar-fill" style="width:'+pct+'%"></div></div>'
      +'<span class="fh-pct">'+pct+'%</span>'
      +'</div>'
      +'</div></div>'
      +'<div class="chapters-list">'+chapHTML+'</div>'
      +'</div>';
  }).join('');
}

function renderStats() {
  var stats = calcStats();
  document.getElementById('stat-modules').textContent = stats.done;
  document.getElementById('stat-pct').textContent = stats.pct + '%';
  document.getElementById('stat-krt').textContent = krt;
  document.getElementById('krtVal').textContent = krt + ' KRT';
  document.getElementById('globalFill').style.width = stats.pct + '%';
}

function renderContinuer() {
  var next = nextModule();
  var card = document.getElementById('continuerCard');
  if (!next) {
    document.getElementById('continuerIcon').textContent = '🏆';
    document.getElementById('continuerTitle').textContent = 'Formation complete !';
    document.getElementById('continuerSub').textContent = 'Tu as tout termine — bravo !';
    card.href = '#';
    return;
  }
  var st = getModuleStatus(next.module.id);
  document.getElementById('continuerIcon').textContent = st==='in-progress'?'▶':'▷';
  document.getElementById('continuerTitle').textContent = next.module.titre;
  document.getElementById('continuerSub').textContent = next.formation.label+' · '+next.chapitre.label;
  card.href = next.module.file;
}

function switchCat(catId) {
  currentCat = catId;
  document.querySelectorAll('.formation-view').forEach(function(v){ v.classList.remove('active'); });
  var view = document.getElementById('view-'+catId);
  if (view) view.classList.add('active');
  renderCatNav();
}

function goToAcademy() { window.scrollTo(0,0); }

// =============================================
// INIT
// =============================================
function init() {
  chargerProg();
  renderStats();
  renderCatNav();
  renderFormations();
  renderContinuer();
  switchCat('codage');
}

init();
</script>
</body>
</html>
